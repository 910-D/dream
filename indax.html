<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabrera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>

  :root {
    --color-bg: #28272C;
    --color-line: #C9CBDB;
    --color-fill: #EAE8EB;
    --color-border: #3A393E;
    --color-border-soft: #45444A;
    --font-body: 'Noto Sans KR', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--color-bg);
    color: var(--color-fill);
    font-family: var(--font-body);
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 20px 96px;
  }

  .section-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--color-line);
    margin: 0 0 16px;
  }

  /* ---------- 기본 정보 ---------- */

  .profile-section {
    margin-bottom: 56px;
  }

  .profile-grid {
    display: grid;
    grid-template-columns: 170px 1fr;
    gap: 18px;
    align-items: stretch;
  }

  .profile-photo {
    border: 1px dashed var(--color-border-soft);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-height: 220px;
  }

  .profile-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .photo-placeholder {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--color-border-soft);
  }

  .info-grid {
    margin: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .info-cell {
    padding: 10px 14px;
    border-bottom: 0.5px solid var(--color-border);
  }

  .info-cell:nth-child(odd) {
    border-right: 0.5px solid var(--color-border);
    padding-left: 0;
  }

  .info-cell:nth-last-child(-n+2) {
    border-bottom: none;
  }

  .info-cell dt {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-line);
    margin-bottom: 6px;
  }

  .info-cell dd {
    margin: 0;
    font-size: 14px;
    line-height: 1.4;
    min-height: 1.4em;
  }

  /* ---------- 상세 정보 ---------- */

  .detail-section {
    margin-bottom: 56px;
  }

  .detail-item {
    padding: 18px 0;
    border-bottom: 0.5px solid var(--color-border);
  }

  .detail-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-line);
    margin: 0 0 8px;
  }

  .detail-value {
    margin: 0;
    font-size: 15px;
    line-height: 1.6;
    min-height: 1.6em;
  }

  .detail-value--long {
    line-height: 1.8;
  }

  .detail-reason {
    margin-top: 12px;
    padding-left: 14px;
    border-left: 2px solid var(--color-border-soft);
  }

  .detail-reason p {
    margin: 0;
    font-size: 13px;
    line-height: 1.7;
    color: var(--color-fill);
    opacity: 0.85;
    min-height: 1.7em;
  }

  /* placeholder 안내 문구: contenteditable 요소가 비어있을 때만 표시됨 */
  [contenteditable]:empty:before {
    content: attr(data-placeholder);
    color: var(--color-border-soft);
  }

  /* ---------- 목소리 ---------- */

  .voice-block {
    padding-top: 18px;
  }

  .voice-list {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .voice-title {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 8px;
  }

  .voice-number {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-line);
  }

  .voice-subtitle {
    font-size: 13px;
    min-width: 40px;
  }

  .voice-player {
    display: flex;
    align-items: center;
    gap: 12px;
    border: 0.5px solid var(--color-border);
    border-radius: 8px;
    padding: 10px 14px;
  }

  .play-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--color-line);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    padding: 0;
  }

  .play-btn svg {
    width: 11px;
    height: 11px;
    fill: var(--color-fill);
  }

  .play-btn .icon-pause { display: none; }
  .play-btn.is-playing .icon-play { display: none; }
  .play-btn.is-playing .icon-pause { display: block; }

  .waveform {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 2px;
    height: 20px;
  }

  .waveform span {
    width: 2px;
    background: var(--color-border-soft);
    border-radius: 1px;
  }

  .time {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-line);
    flex-shrink: 0;
  }

</style>
</head>
<body>

<main class="page">

  <section class="profile-section">
    <p class="section-label">BASIC INFO</p>
    <div class="profile-grid">

      <div class="profile-photo">
        <!-- 실제 사진 넣을 땐 아래 span을 지우고 <img src="사진경로.jpg" alt="이름"> 로 교체 -->
        <span class="photo-placeholder">이미지</span>
      </div>

      <dl class="info-grid">
        <div class="info-cell"><dt>이름</dt><dd contenteditable="true" data-placeholder="입력"></dd></div>
        <div class="info-cell"><dt>이명</dt><dd contenteditable="true" data-placeholder="입력"></dd></div>
        <div class="info-cell"><dt>생일</dt><dd contenteditable="true" data-placeholder="입력"></dd></div>
        <div class="info-cell"><dt>나이</dt><dd contenteditable="true" data-placeholder="입력"></dd></div>
        <div class="info-cell"><dt>신장</dt><dd contenteditable="true" data-placeholder="입력"></dd></div>
        <div class="info-cell"><dt>혈액형</dt><dd contenteditable="true" data-placeholder="입력"></dd></div>
        <div class="info-cell"><dt>출신지</dt><dd contenteditable="true" data-placeholder="입력"></dd></div>
        <div class="info-cell"><dt>현상금</dt><dd contenteditable="true" data-placeholder="입력"></dd></div>
        <div class="info-cell"><dt>능력</dt><dd contenteditable="true" data-placeholder="입력"></dd></div>
        <div class="info-cell"><dt>소속</dt><dd contenteditable="true" data-placeholder="입력"></dd></div>
        <div class="info-cell"><dt>좋아하는 음식</dt><dd contenteditable="true" data-placeholder="입력"></dd></div>
        <div class="info-cell"><dt>싫어하는 음식</dt><dd contenteditable="true" data-placeholder="입력"></dd></div>
        <div class="info-cell"><dt>취미</dt><dd contenteditable="true" data-placeholder="입력"></dd></div>
        <div class="info-cell"></div>
      </dl>

    </div>
  </section>

  <section class="detail-section">
    <p class="section-label">DETAIL</p>

    <div class="detail-item">
      <p class="detail-label">1인칭</p>
      <p class="detail-value" contenteditable="true" data-placeholder="입력"></p>
    </div>

    <div class="detail-item">
      <p class="detail-label">호칭 및 별명</p>
      <p class="detail-value" contenteditable="true" data-placeholder="입력"></p>
      <div class="detail-reason">
        <p contenteditable="true" data-placeholder="그렇게 불리는 이유"></p>
      </div>
    </div>

    <div class="detail-item">
      <p class="detail-label">성격</p>
      <p class="detail-value" contenteditable="true" data-placeholder="입력"></p>
      <div class="detail-reason">
        <p contenteditable="true" data-placeholder="그렇게 된 계기"></p>
      </div>
    </div>

    <div class="detail-item">
      <p class="detail-label">주위 평판</p>
      <p class="detail-value detail-value--long" contenteditable="true" data-placeholder="상세하게 입력"></p>
    </div>

    <div class="detail-item">
      <p class="detail-label">강점</p>
      <p class="detail-value" contenteditable="true" data-placeholder="입력"></p>
      <div class="detail-reason">
        <p contenteditable="true" data-placeholder="계기"></p>
      </div>
    </div>

    <div class="detail-item">
      <p class="detail-label">약점</p>
      <p class="detail-value" contenteditable="true" data-placeholder="입력"></p>
      <div class="detail-reason">
        <p contenteditable="true" data-placeholder="계기"></p>
      </div>
    </div>

    <div class="detail-item">
      <p class="detail-label">가치관</p>
      <p class="detail-value" contenteditable="true" data-placeholder="입력"></p>
      <div class="detail-reason">
        <p contenteditable="true" data-placeholder="계기"></p>
      </div>
    </div>

    <div class="voice-block">
      <p class="detail-label">목소리</p>

      <div class="voice-list">

        <!-- 클립 하나. 늘리려면 이 .voice-clip 블록 전체를 복사해서 번호만 바꾸면 됨 -->
        <div class="voice-clip">
          <div class="voice-title">
            <span class="voice-number">01</span>
            <span class="voice-subtitle" contenteditable="true" data-placeholder="클립 제목">01</span>
          </div>
          <div class="voice-player">
            <button class="play-btn" aria-label="재생">
              <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
            </button>
            <div class="waveform">
              <span style="height:6px;"></span><span style="height:14px;"></span><span style="height:9px;"></span>
              <span style="height:18px;"></span><span style="height:11px;"></span><span style="height:16px;"></span>
              <span style="height:7px;"></span><span style="height:13px;"></span><span style="height:9px;"></span>
              <span style="height:15px;"></span><span style="height:6px;"></span><span style="height:12px;"></span>
            </div>
            <span class="time">0:00 / 0:00</span>
            <!-- src에 실제 음성 파일 경로 넣기 -->
            <audio class="audio-el" src=""></audio>
          </div>
        </div>

        <div class="voice-clip">
          <div class="voice-title">
            <span class="voice-number">02</span>
            <span class="voice-subtitle" contenteditable="true" data-placeholder="클립 제목">02</span>
          </div>
          <div class="voice-player">
            <button class="play-btn" aria-label="재생">
              <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
            </button>
            <div class="waveform">
              <span style="height:9px;"></span><span style="height:17px;"></span><span style="height:6px;"></span>
              <span style="height:12px;"></span><span style="height:15px;"></span><span style="height:8px;"></span>
              <span style="height:14px;"></span><span style="height:10px;"></span><span style="height:16px;"></span>
              <span style="height:7px;"></span>
            </div>
            <span class="time">0:00 / 0:00</span>
            <audio class="audio-el" src=""></audio>
          </div>
        </div>

        <div class="voice-clip">
          <div class="voice-title">
            <span class="voice-number">03</span>
            <span class="voice-subtitle" contenteditable="true" data-placeholder="클립 제목">03</span>
          </div>
          <div class="voice-player">
            <button class="play-btn" aria-label="재생">
              <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
            </button>
            <div class="waveform">
              <span style="height:12px;"></span><span style="height:7px;"></span><span style="height:16px;"></span>
              <span style="height:9px;"></span><span style="height:14px;"></span><span style="height:6px;"></span>
              <span style="height:18px;"></span><span style="height:10px;"></span>
            </div>
            <span class="time">0:00 / 0:00</span>
            <audio class="audio-el" src=""></audio>
          </div>
        </div>

      </div>
    </div>

  </section>

</main>

<script>
  // 재생 버튼 클릭 시 재생/일시정지 토글 + 진행 시간 표시
  document.querySelectorAll('.voice-player').forEach(function (player) {
    var btn = player.querySelector('.play-btn');
    var audio = player.querySelector('.audio-el');
    var timeEl = player.querySelector('.time');

    function formatTime(sec) {
      if (!isFinite(sec)) return '0:00';
      var m = Math.floor(sec / 60);
      var s = Math.floor(sec % 60).toString().padStart(2, '0');
      return m + ':' + s;
    }

    btn.addEventListener('click', function () {
      if (!audio.src) return; // 오디오 파일이 아직 연결 안 된 경우 무시
      if (audio.paused) {
        audio.play();
        btn.classList.add('is-playing');
      } else {
        audio.pause();
        btn.classList.remove('is-playing');
      }
    });

    audio.addEventListener('timeupdate', function () {
      timeEl.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
    });

    audio.addEventListener('ended', function () {
      btn.classList.remove('is-playing');
    });
  });
</script>

</body>
</html>
