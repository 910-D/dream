<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabrera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>

  :root {
    --color-bg: #28272C;
    --color-line: #C9CBDB;
    --color-fill: #EAE8EB;
    --color-border: #3A393E;
    --color-border-soft: #45444A;
    --font-body: 'Noto Sans KR', 'Noto Sans JP', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--color-bg);
    color: var(--color-fill);
    font-family: var(--font-body);
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px 96px;
  }

  /* ---------- 언어 전환 ---------- */

  .lang-switcher {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
    margin-bottom: 40px;
  }

  .lang-switcher button {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.5px;
    color: var(--color-line);
    background: transparent;
    border: 0.5px solid var(--color-border-soft);
    border-radius: 4px;
    padding: 6px 10px;
    cursor: pointer;
  }

  .lang-switcher button.active {
    color: var(--color-bg);
    background: var(--color-line);
    border-color: var(--color-line);
  }

  .section-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--color-line);
    margin: 0 0 16px;
  }

  /* ---------- 기본 정보 ---------- */

  .profile-section {
    margin-bottom: 56px;
  }

  .profile-grid {
    display: grid;
    grid-template-columns: 170px 1fr;
    gap: 18px;
    align-items: stretch;
  }

  .profile-photo {
    border: 1px dashed var(--color-border-soft);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-height: 220px;
  }

  .profile-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .photo-placeholder {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--color-border-soft);
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .info-cell {
    padding: 10px 14px;
    border-bottom: 0.5px solid var(--color-border);
  }

  .info-cell:nth-child(odd) {
    border-right: 0.5px solid var(--color-border);
    padding-left: 0;
  }

  .info-cell:nth-last-child(-n+2) {
    border-bottom: none;
  }

  .info-cell dt {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-line);
    margin: 0 0 6px;
  }

  .info-cell dd {
    margin: 0;
    font-size: 14px;
    line-height: 1.4;
    min-height: 1.4em;
  }

  .footnote-ref {
    font-size: 9px;
    color: var(--color-line);
    margin-left: 1px;
  }

  .cell-divider {
    display: block;
    height: 0.5px;
    background: var(--color-border-soft);
    margin: 6px 0;
  }

  .footnotes {
    margin-top: 10px;
    padding-top: 10px;
  }

  .footnotes p {
    margin: 0 0 4px;
    font-family: var(--font-mono);
    font-size: 10px;
    line-height: 1.6;
    color: var(--color-line);
    opacity: 0.75;
  }

  .footnotes p:last-child {
    margin-bottom: 0;
  }

  /* ---------- 상세 정보 ---------- */

  .detail-section {
    margin-bottom: 56px;
  }

  .detail-item {
    padding: 18px 0;
    border-bottom: 0.5px solid var(--color-border);
  }

  .detail-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-line);
    margin: 0 0 8px;
  }

  .detail-value {
    margin: 0;
    font-size: 15px;
    line-height: 1.6;
    min-height: 1.6em;
  }

  .detail-value--long {
    line-height: 1.8;
  }

  .detail-reason {
    margin-top: 12px;
    padding-left: 14px;
    border-left: 2px solid var(--color-border-soft);
  }

  .detail-reason p {
    margin: 0;
    font-size: 13px;
    line-height: 1.7;
    color: var(--color-fill);
    opacity: 0.85;
    min-height: 1.7em;
  }

  /* ---------- 목소리 ---------- */

  .voice-block {
    padding-top: 18px;
  }

  .voice-list {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .voice-title {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 8px;
  }

  .voice-number {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-line);
  }

  .voice-subtitle {
    font-size: 13px;
  }

  .voice-player {
    display: flex;
    align-items: center;
    gap: 12px;
    border: 0.5px solid var(--color-border);
    border-radius: 8px;
    padding: 10px 14px;
  }

  .play-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--color-line);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    padding: 0;
  }

  .play-btn svg {
    width: 11px;
    height: 11px;
    fill: var(--color-fill);
  }

  .play-btn .icon-pause { display: none; }
  .play-btn.is-playing .icon-play { display: none; }
  .play-btn.is-playing .icon-pause { display: block; }

  .waveform {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 2px;
    height: 20px;
  }

  .waveform span {
    width: 2px;
    background: var(--color-border-soft);
    border-radius: 1px;
  }

  .time {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-line);
    flex-shrink: 0;
  }

  /* ---------- 모바일 반응형 ---------- */

  @media (max-width: 600px) {

    .page {
      padding: 20px 16px 72px;
    }

    .profile-grid {
      grid-template-columns: 1fr;
    }

    .profile-photo {
      min-height: 0;
      aspect-ratio: 16 / 9;
    }

    .info-grid {
      grid-template-columns: 1fr 1fr;
    }

    .detail-value {
      font-size: 16px;
    }

    .voice-player {
      padding: 10px 12px;
    }

    .waveform span {
      width: 2.5px;
    }

  }

</style>
</head>
<body>

<main class="page">

  <div class="lang-switcher">
    <button data-lang="kr">KR</button>
    <button data-lang="jp">JP</button>
    <button data-lang="en">EN</button>
  </div>

  <section class="profile-section">
    <p class="section-label" id="basicInfoLabel">BASIC INFO</p>
    <div class="profile-grid">

      <div class="profile-photo">
        <!-- 실제 사진 넣을 땐 아래 span을 지우고 <img src="사진경로.jpg" alt="이름"> 로 교체 (사진은 언어와 무관하니 그대로 둬도 됨) -->
        <span class="photo-placeholder">이미지</span>
      </div>

      <dl class="info-grid" id="infoGrid"></dl>

    </div>

    <div class="footnotes" id="footnotes"></div>
  </section>

  <section class="detail-section">
    <p class="section-label" id="detailLabel">DETAIL</p>

    <div id="detailList"></div>

    <div class="voice-block">
      <p class="detail-label" id="voiceLabel">목소리</p>
      <div class="voice-list" id="voiceList"></div>
    </div>

  </section>

</main>

<script>

  /* ========================================================
     1. 라벨 번역 사전
     ======================================================== */
  const labels = {
    kr: { name:'이름', alias:'이명', birthday:'생일', age:'나이', height:'신장', bloodType:'혈액형',
          origin:'출신지', bounty:'현상금', ability:'능력', affiliation:'소속',
          favFood:'좋아하는 음식', dislikeFood:'싫어하는 음식', hobby:'취미',
          firstPerson:'1인칭', nickname:'호칭 및 별명', personality:'성격', reputation:'주위 평판',
          strength:'강점', weakness:'약점', values:'가치관', voice:'목소리' },
    jp: { name:'名前', alias:'二つ名', birthday:'誕生日', age:'年齢', height:'身長', bloodType:'血液型',
          origin:'出身地', bounty:'懸賞金', ability:'能力', affiliation:'所属',
          favFood:'好きな食べ物', dislikeFood:'嫌いな食べ物', hobby:'趣味',
          firstPerson:'一人称', nickname:'呼び方・あだ名', personality:'性格', reputation:'周囲の評判',
          strength:'強み', weakness:'弱み', values:'価値観', voice:'声' },
    en: { name:'Name', alias:'Alias', birthday:'Birthday', age:'Age', height:'Height', bloodType:'Blood type',
          origin:'Origin', bounty:'Bounty', ability:'Ability', affiliation:'Affiliation',
          favFood:'Favorite food', dislikeFood:'Least favorite food', hobby:'Hobby',
          firstPerson:'First person', nickname:'Title & nickname', personality:'Personality', reputation:'Reputation',
          strength:'Strength', weakness:'Weakness', values:'Values', voice:'Voice' }
  };

  /* ========================================================
     2. 실제 콘텐츠 — 여기에 kr / jp / en 세 언어로 직접 채워넣기
     ======================================================== */

  const basicInfo = [
    { key:'name',        kr:'카브레라', jp:'カブレラ', en:'Cabrera' },
    { key:'alias',       kr:'모놀로그', jp:'独白', en:'Monologue' },
    { key:'birthday',    kr:'', jp:'', en:'' },
    { key:'age',         kr:'28세(2년 전) → 30세(2년 후)', jp:'28歳（2年前）→30歳（2年後）', en:'28 (2 years ago) → 30 (2 years later)' },
    { key:'height',      kr:'170cm', jp:'170cm', en:'170cm' },
    { key:'bloodType',   kr:'XF형<sup class="footnote-ref">1)</sup>', jp:'XF型<sup class="footnote-ref">1)</sup>', en:'Type XF<sup class="footnote-ref">1)</sup>' },
    { key:'origin',      kr:'위대한 항로', jp:'グランドライン', en:'Grand Line' },
    { key:'bounty',      kr:'6억 5,500만 베리', jp:'6億5,500万ベリー', en:'655,000,000 Berries' },
    { key:'ability',     kr:'비능력자, 패기(견문색, 무장색)', jp:'非能力者、覇気（見聞色・武装色）', en:'Non-Devil Fruit user, Haki (Observation, Armament)' },
    { key:'affiliation', kr:'前 바로크 워크스<span class="cell-divider"></span>크로스 길드', jp:'元バロックワークス<span class="cell-divider"></span>クロスギルド', en:'Former Baroque Works<span class="cell-divider"></span>Cross Guild' },
    { key:'favFood',     kr:'빵, 방울토마토', jp:'パン、プチトマト', en:'Bread, cherry tomatoes' },
    { key:'dislikeFood', kr:'버섯, 토마토', jp:'きのこ、トマト', en:'Mushrooms, tomatoes' },
    { key:'hobby',       kr:'독서', jp:'読書', en:'Reading' }
  ];

  const detail = {
    firstPerson: { kr:'나', jp:'私', en:'I' },
    nickname:    {
      value:{ kr:'대배우', jp:'大俳優', en:'The Great Performer' },
      reason:{
        kr:'위대한 항로의 여러 섬을 넘나들면서 단독으로 활동해 온 그녀는, 매번 전혀 다른 성격과 신분, 외모를 바꿔 연기를 하며 철저하게 정체를 위장해 왔다.<br><br>스스로를 \'무대 위의 배우\'라 칭하며 자신과 적대적인 인물은 \'조연\', 우호적인 인물에게는 \'관객\'이라 부르는 독특한 호칭 또한 \'대배우\'라 불리는 데에 한몫했다.',
        jp:'グランドラインの島々を渡り歩きながら単独で活動してきた彼女は、毎回まったく異なる性格や身分、外見を演じ分け、徹底して正体を偽装してきた。<br><br>自らを「舞台の上の役者」と称し、敵対する人物を「脇役」、友好的な人物を「観客」と呼ぶ独特な呼び方もまた、「大俳優」と呼ばれる一因となった。',
        en:'Having operated alone while crossing islands across the Grand Line, she has thoroughly disguised her identity, playing an entirely different personality, status, and appearance each time.<br><br>She calls herself \'a performer on stage,\' referring to those hostile to her as \'supporting roles\' and those friendly to her as \'the audience\' — this distinctive way of addressing people also contributed to her being called \'the Great Performer.\''
      }
    },
    personality: {
      value:{
        kr:'어떤 순간에도 흐트러짐 없는 포커페이스, 철저한 배우.',
        jp:'どんな瞬間も崩れないポーカーフェイス、徹底した役者。',
        en:'A poker face that never breaks, no matter the moment — a thoroughgoing actor.'
      },
      reason:{
        kr:'세상을 무대로, 자신을 그 무대 위의 주인공으로 여기는 태도를 가지고 있다. 과거의 나약한 모습을 철저히 감추기 위해, 그녀는 매 순간 완벽하게 연출된 \'배역\'으로 사람들을 상대한다.<br><br>겉으로는 당당하고 독단적인 대배우로 활동하고 있지만, 내면에는 무의식적인 공포와 결핍이 있다. 조직에 소속되는 것을 꺼리는 이유 역시, 누군가와 깊은 관계를 맺었다가 다시 절망을 맞이할까 봐 두려움을 겪고 있기 때문이다.',
        jp:'世界を舞台とし、自分をその舞台の上の主人公とみなす態度を持っている。過去の弱々しい姿を徹底して隠すため、彼女は瞬間ごとに完璧に演出された「役柄」で人々と接する。<br><br>表向きは堂々として独断的な大俳優として活動しているが、内面には無意識の恐怖と欠乏がある。組織に所属することを避ける理由もまた、誰かと深い関係を築いた末に再び絶望を迎えることを恐れているためである。',
        en:'She regards the world as a stage and herself as the protagonist upon it. To thoroughly conceal her past weakness, she faces people at every moment through a perfectly staged \'role.\'<br><br>On the surface, she carries herself as a confident, headstrong Great Performer, but inwardly she harbors an unconscious fear and sense of lack. Her reluctance to belong to any organization also stems from a fear of forming a deep bond with someone, only to face despair once again.'
      }
    },
    reputation:  {
      kr:'그녀를 한 번이라도 본 이들은 \'속내를 알 수 없는 위험한 인물\'로 평가한다. 섬마다 완전히 다른 성격과 신분, 외모로 살아가며 활동하는 연기력 때문에 그녀를 추적하려는 이들은 전부 실패로 끝났다.<br><br>수많은 이들이 무대 뒤에 숨은 그녀의 진짜 얼굴을 들춰내려 했으나, 오히려 그녀가 짜놓은 완벽한 대본 속에서 조연으로 농락당할 뿐이다.',
      jp:'彼女を一度でも見た者たちは、「腹の内が読めない危険な人物」と評価する。島ごとにまったく異なる性格や身分、外見で生き、活動するその演技力のせいで、彼女を追跡しようとした者たちはことごとく失敗に終わった。<br><br>数多くの者たちが舞台裏に隠れた彼女の本当の顔を暴こうとしたが、むしろ彼女が組み立てた完璧な台本の中で、脇役として弄ばれるだけであった。',
      en:'Those who have laid eyes on her even once regard her as \'a dangerous figure whose true intentions are impossible to read.\' Because of her acting skill — living and operating under an entirely different personality, status, and appearance on every island — everyone who has tried to track her down has ended in failure.<br><br>Countless people have tried to uncover the real face she hides behind the curtain, but they end up merely toyed with as supporting characters within the perfect script she has already written.'
    },
    strength:    { value:{kr:'',jp:'',en:''}, reason:{kr:'',jp:'',en:''} },
    weakness:    { value:{kr:'',jp:'',en:''}, reason:{kr:'',jp:'',en:''} },
    values:      { value:{kr:'',jp:'',en:''}, reason:{kr:'',jp:'',en:''} }
  };

  const voiceClips = [
    { number:'01', title:{kr:'',jp:'',en:''}, src:'' },
    { number:'02', title:{kr:'',jp:'',en:''}, src:'' },
    { number:'03', title:{kr:'',jp:'',en:''}, src:'' }
  ];

  // 기본 정보 값 안에 <sup class="footnote-ref">1)</sup> 처럼 번호를 넣으면
  // 이 배열의 같은 번호(num) 각주가 정보 그리드 아래에 자동으로 나열됨
  const footnotes = [
    { num:'1)', kr:'AB형', jp:'AB型', en:'Type AB' }
  ];

  /* ========================================================
     3. 렌더링
     ======================================================== */

  function waveformBars(count) {
    let bars = '';
    for (let i = 0; i < count; i++) {
      const h = 6 + Math.floor(Math.random() * 12);
      bars += `<span style="height:${h}px;"></span>`;
    }
    return bars;
  }

  function render(lang) {
    document.body.setAttribute('lang', lang === 'kr' ? 'ko' : lang === 'jp' ? 'ja' : 'en');
    document.querySelectorAll('.lang-switcher button').forEach(function (btn) {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });

    const L = labels[lang];

    document.getElementById('basicInfoLabel').textContent = 'BASIC INFO';
    document.getElementById('detailLabel').textContent = 'DETAIL';
    document.getElementById('voiceLabel').textContent = L.voice;

    document.getElementById('infoGrid').innerHTML =
      basicInfo.map(function (item) {
        return '<div class="info-cell"><dt>' + L[item.key] + '</dt><dd>' + (item[lang] || '') + '</dd></div>';
      }).join('') + '<div class="info-cell"></div>';

    document.getElementById('footnotes').innerHTML =
      footnotes.map(function (fn) {
        return '<p>' + fn.num + ' ' + (fn[lang] || '') + '</p>';
      }).join('');

    document.getElementById('detailList').innerHTML = `
      <div class="detail-item">
        <p class="detail-label">${L.firstPerson}</p>
        <p class="detail-value">${detail.firstPerson[lang] || ''}</p>
      </div>
      <div class="detail-item">
        <p class="detail-label">${L.nickname}</p>
        <p class="detail-value">${detail.nickname.value[lang] || ''}</p>
        <div class="detail-reason"><p>${detail.nickname.reason[lang] || ''}</p></div>
      </div>
      <div class="detail-item">
        <p class="detail-label">${L.personality}</p>
        <p class="detail-value">${detail.personality.value[lang] || ''}</p>
        <div class="detail-reason"><p>${detail.personality.reason[lang] || ''}</p></div>
      </div>
      <div class="detail-item">
        <p class="detail-label">${L.reputation}</p>
        <p class="detail-value detail-value--long">${detail.reputation[lang] || ''}</p>
      </div>
      <div class="detail-item">
        <p class="detail-label">${L.strength}</p>
        <p class="detail-value">${detail.strength.value[lang] || ''}</p>
        <div class="detail-reason"><p>${detail.strength.reason[lang] || ''}</p></div>
      </div>
      <div class="detail-item">
        <p class="detail-label">${L.weakness}</p>
        <p class="detail-value">${detail.weakness.value[lang] || ''}</p>
        <div class="detail-reason"><p>${detail.weakness.reason[lang] || ''}</p></div>
      </div>
      <div class="detail-item">
        <p class="detail-label">${L.values}</p>
        <p class="detail-value">${detail.values.value[lang] || ''}</p>
        <div class="detail-reason"><p>${detail.values.reason[lang] || ''}</p></div>
      </div>
    `;

    document.getElementById('voiceList').innerHTML =
      voiceClips.map(function (clip) {
        return `
          <div class="voice-clip">
            <div class="voice-title">
              <span class="voice-number">${clip.number}</span>
              <span class="voice-subtitle">${clip.title[lang] || ''}</span>
            </div>
            <div class="voice-player">
              <button class="play-btn" aria-label="play">
                <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
              </button>
              <div class="waveform">${waveformBars(12)}</div>
              <span class="time">0:00 / 0:00</span>
              <audio class="audio-el" src="${clip.src}"></audio>
            </div>
          </div>
        `;
      }).join('');

    attachVoicePlayers();
  }

  function attachVoicePlayers() {
    document.querySelectorAll('.voice-player').forEach(function (player) {
      const btn = player.querySelector('.play-btn');
      const audio = player.querySelector('.audio-el');
      const timeEl = player.querySelector('.time');

      function formatTime(sec) {
        if (!isFinite(sec)) return '0:00';
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60).toString().padStart(2, '0');
        return m + ':' + s;
      }

      btn.addEventListener('click', function () {
        if (!audio.getAttribute('src')) return;
        if (audio.paused) {
          audio.play();
          btn.classList.add('is-playing');
        } else {
          audio.pause();
          btn.classList.remove('is-playing');
        }
      });

      audio.addEventListener('timeupdate', function () {
        timeEl.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
      });

      audio.addEventListener('ended', function () {
        btn.classList.remove('is-playing');
      });
    });
  }

  /* ========================================================
     4. 언어 전환 버튼
     ======================================================== */
  document.querySelectorAll('.lang-switcher button').forEach(function (btn) {
    btn.addEventListener('click', function () { render(btn.dataset.lang); });
  });

  render('kr');

</script>

</body>
</html>
