<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabrera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>

  :root {
    --color-bg: #28272C;
    --color-line: #C9CBDB;
    --color-fill: #EAE8EB;
    --color-border: #3A393E;
    --color-border-soft: #45444A;
    --font-body: 'Noto Sans KR', 'Noto Sans JP', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--color-bg);
    color: var(--color-fill);
    font-family: var(--font-body);
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px 96px;
  }

  /* ---------- 언어 전환 ---------- */

  .lang-switcher {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
    margin-bottom: 40px;
  }

  .lang-switcher button {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.5px;
    color: var(--color-line);
    background: transparent;
    border: 0.5px solid var(--color-border-soft);
    border-radius: 4px;
    padding: 6px 10px;
    cursor: pointer;
  }

  .lang-switcher button.active {
    color: var(--color-bg);
    background: var(--color-line);
    border-color: var(--color-line);
  }

  .section-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--color-line);
    margin: 0 0 16px;
  }

  /* ---------- 기본 정보 ---------- */

  .profile-section {
    margin-bottom: 56px;
  }

  .profile-grid {
    display: grid;
    grid-template-columns: 170px 1fr;
    gap: 18px;
    align-items: stretch;
  }

  .profile-photo {
    border: 1px dashed var(--color-border-soft);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-height: 220px;
  }

  .profile-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .photo-placeholder {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--color-border-soft);
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .info-cell {
    padding: 10px 14px;
    border-bottom: 0.5px solid var(--color-border);
  }

  .info-cell:nth-child(odd) {
    border-right: 0.5px solid var(--color-border);
    padding-left: 0;
  }

  .info-cell:nth-last-child(-n+2) {
    border-bottom: none;
  }

  .info-cell dt {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-line);
    margin: 0 0 6px;
  }

  .info-cell dd {
    margin: 0;
    font-size: 14px;
    line-height: 1.4;
    min-height: 1.4em;
  }

  .footnote-ref {
    font-size: 9px;
    color: var(--color-line);
    margin-left: 1px;
  }

  .cell-divider {
    display: block;
    height: 0.5px;
    background: var(--color-border-soft);
    margin: 6px 0;
  }

  .footnotes {
    margin-top: 10px;
    padding-top: 10px;
  }

  .footnotes p {
    margin: 0 0 4px;
    font-family: var(--font-mono);
    font-size: 10px;
    line-height: 1.6;
    color: var(--color-line);
    opacity: 0.75;
  }

  .footnotes p:last-child {
    margin-bottom: 0;
  }

  /* ---------- 상세 정보 ---------- */

  .detail-section {
    margin-bottom: 56px;
  }

  .detail-item {
    padding: 18px 0;
    border-bottom: 0.5px solid var(--color-border);
  }

  .detail-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-line);
    margin: 0 0 8px;
  }

  .detail-value {
    margin: 0;
    font-size: 15px;
    line-height: 1.6;
    min-height: 1.6em;
  }

  .detail-value--long {
    line-height: 1.8;
  }

  .detail-reason {
    margin-top: 12px;
    padding-left: 14px;
    border-left: 2px solid var(--color-border-soft);
  }

  .detail-reason p {
    margin: 0;
    font-size: 13px;
    line-height: 1.7;
    color: var(--color-fill);
    opacity: 0.85;
    min-height: 1.7em;
  }

  /* ---------- 목소리 ---------- */

  .voice-block {
    padding-top: 18px;
  }

  .voice-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0;
  }

  .voice-credit {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-line);
    opacity: 0.7;
  }

  .voice-list {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .voice-title {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 8px;
  }

  .voice-number {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-line);
  }

  .voice-subtitle {
    font-size: 13px;
  }

  .voice-player {
    display: flex;
    align-items: center;
    gap: 12px;
    border: 0.5px solid var(--color-border);
    border-radius: 8px;
    padding: 10px 14px;
  }

  .play-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--color-line);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    padding: 0;
  }

  .play-btn svg {
    width: 11px;
    height: 11px;
    fill: var(--color-fill);
  }

  .play-btn .icon-pause { display: none; }
  .play-btn.is-playing .icon-play { display: none; }
  .play-btn.is-playing .icon-pause { display: block; }

  .waveform {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 2px;
    height: 20px;
  }

  .waveform span {
    width: 2px;
    background: var(--color-border-soft);
    border-radius: 1px;
  }

  .time {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-line);
    flex-shrink: 0;
  }

  /* ---------- 페이지 전환 ---------- */

  .app-page[hidden] {
    display: none;
  }

  .page-nav {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: #1F1E22;
    border-top: 0.5px solid var(--color-border-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 14px 20px;
    z-index: 10;
  }

  .page-nav-btn {
    background: none;
    border: none;
    color: var(--color-line);
    font-size: 15px;
    line-height: 1;
    cursor: pointer;
    padding: 4px 6px;
  }

  .page-nav-btn:disabled {
    color: var(--color-border-soft);
    cursor: default;
  }

  .page-nav-indicator {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-line);
    opacity: 0.7;
    min-width: 96px;
    text-align: center;
  }

  /* ---------- 외모 페이지 ---------- */

  .appearance-section {
    padding-top: 0;
  }

  /* ---------- 과거(타임라인) 페이지 ---------- */

  .past-section {
    padding-top: 0;
  }

  .timeline {
    position: relative;
    padding-left: 26px;
    margin-top: 20px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 5px;
    top: 6px;
    bottom: 6px;
    width: 1px;
    background: var(--color-border-soft);
  }

  .timeline-item {
    position: relative;
    padding-bottom: 32px;
  }

  .timeline-item:last-child {
    padding-bottom: 0;
  }

  .timeline-marker {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-left: -26px;
    width: calc(100% + 26px);
    background: none;
    border: none;
    padding: 4px 0;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
  }

  .timeline-chevron {
    margin-left: auto;
    font-size: 10px;
    color: var(--color-line);
    flex-shrink: 0;
  }

  .timeline-dot {
    flex-shrink: 0;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--color-bg);
    border: 1.5px solid var(--color-line);
  }

  .timeline-dot--present {
    width: 13px;
    height: 13px;
    background: var(--color-line);
  }

  .timeline-dot--future {
    border-style: dashed;
    border-color: var(--color-border-soft);
  }

  .timeline-label {
    font-size: 11px;
    color: var(--color-line);
    font-family: var(--font-mono);
    line-height: 1;
  }

  .timeline-label--present {
    color: var(--color-fill);
    font-weight: 600;
  }

  .timeline-label--future {
    color: var(--color-line);
  }

  .timeline-body {
    margin-top: 9px;
    font-size: 14px;
    line-height: 1.7;
  }

  .timeline-body p {
    margin: 0 0 12px;
  }

  .timeline-body p:last-child {
    margin-bottom: 0;
  }

  .scene-break {
    height: 1px;
    margin: 14px 0;
  }

  .quote-line {
    font-style: italic;
    text-align: center;
    color: var(--color-line);
    margin: 4px 0 !important;
  }

  .side-story {
    margin-top: 12px;
    border-top: 0.5px solid var(--color-border);
  }

  .side-story-toggle {
    display: flex;
    align-items: center;
    width: 100%;
    background: none;
    border: none;
    padding: 10px 0;
    cursor: pointer;
  }

  .side-story-number {
    font-size: 10px;
    color: var(--color-line);
    font-family: var(--font-mono);
    opacity: 0.8;
  }

  .side-story-toggle.is-open .side-story-number {
    color: var(--color-fill);
    opacity: 1;
  }

  .side-story-chevron {
    margin-left: auto;
    font-size: 11px;
    color: var(--color-line);
  }

  .side-story-body {
    padding: 0 0 6px;
    font-size: 13px;
    line-height: 1.7;
    opacity: 0.85;
  }

  /* ---------- 모바일 반응형 ---------- */

  @media (max-width: 600px) {

    .page {
      padding: 20px 16px 72px;
    }

    .profile-grid {
      grid-template-columns: 1fr;
    }

    .profile-photo {
      min-height: 0;
      aspect-ratio: 16 / 9;
    }

    .info-grid {
      grid-template-columns: 1fr 1fr;
    }

    .detail-value {
      font-size: 16px;
    }

    .voice-player {
      padding: 10px 12px;
    }

    .waveform span {
      width: 2.5px;
    }

  }

</style>
</head>
<body>

<main class="page">

  <div class="lang-switcher">
    <button data-lang="kr">KR</button>
    <button data-lang="jp">JP</button>
    <button data-lang="en">EN</button>
  </div>

  <div class="app-page" id="pageProfile">

    <section class="profile-section">
      <p class="section-label" id="basicInfoLabel">BASIC INFO</p>
      <div class="profile-grid">

        <div class="profile-photo">
          <!-- 실제 사진 넣을 땐 아래 span을 지우고 <img src="사진경로.jpg" alt="이름"> 로 교체 (사진은 언어와 무관하니 그대로 둬도 됨) -->
          <span class="photo-placeholder">이미지</span>
        </div>

        <dl class="info-grid" id="infoGrid"></dl>

      </div>

      <div class="footnotes" id="footnotes"></div>
    </section>

    <section class="detail-section">
      <p class="section-label" id="detailLabel">DETAIL</p>

      <div id="detailList"></div>

      <div class="voice-block">
        <div class="voice-header">
          <p class="detail-label" id="voiceLabel">목소리</p>
          <span class="voice-credit">&copy; 윻 님</span>
        </div>
        <div class="voice-list" id="voiceList"></div>
      </div>

    </section>

  </div>

  <div class="app-page" id="pageAppearance" hidden>

    <section class="appearance-section">
      <p class="section-label" id="appearanceLabel">APPEARANCE</p>

      <div id="appearanceList"></div>
    </section>

  </div>

  <div class="app-page" id="pagePast" hidden>

    <section class="past-section">
      <p class="section-label" id="pastLabel">STORY</p>

      <div class="timeline" id="timeline"></div>
    </section>

  </div>

</main>

<nav class="page-nav">
  <button class="page-nav-btn" id="prevPageBtn" aria-label="prev">◀</button>
  <span class="page-nav-indicator" id="pageIndicator"></span>
  <button class="page-nav-btn" id="nextPageBtn" aria-label="next">▶</button>
</nav>

<script>

  /* ========================================================
     1. 라벨 번역 사전
     ======================================================== */
  const labels = {
    kr: { name:'이름', alias:'이명', birthday:'생일', age:'나이', height:'신장', bloodType:'혈액형',
          origin:'출신지', bounty:'현상금', ability:'능력', affiliation:'소속',
          favFood:'좋아하는 음식', dislikeFood:'싫어하는 음식', hobby:'취미',
          firstPerson:'1인칭', nickname:'호칭 및 별명', personality:'성격', reputation:'주위 평판',
          strength:'강점', weakness:'약점', values:'가치관', voice:'목소리' },
    jp: { name:'名前', alias:'二つ名', birthday:'誕生日', age:'年齢', height:'身長', bloodType:'血液型',
          origin:'出身地', bounty:'懸賞金', ability:'能力', affiliation:'所属',
          favFood:'好きな食べ物', dislikeFood:'嫌いな食べ物', hobby:'趣味',
          firstPerson:'一人称', nickname:'呼び方・あだ名', personality:'性格', reputation:'周囲の評判',
          strength:'強み', weakness:'弱み', values:'価値観', voice:'声' },
    en: { name:'Name', alias:'Alias', birthday:'Birthday', age:'Age', height:'Height', bloodType:'Blood type',
          origin:'Origin', bounty:'Bounty', ability:'Ability', affiliation:'Affiliation',
          favFood:'Favorite food', dislikeFood:'Least favorite food', hobby:'Hobby',
          firstPerson:'First person', nickname:'Title & nickname', personality:'Personality', reputation:'Reputation',
          strength:'Strength', weakness:'Weakness', values:'Values', voice:'Voice' }
  };

  /* ========================================================
     2. 실제 콘텐츠 — 여기에 kr / jp / en 세 언어로 직접 채워넣기
     ======================================================== */

  const basicInfo = [
    { key:'name',        kr:'카브레라', jp:'カブレラ', en:'Cabrera' },
    { key:'alias',       kr:'모놀로그', jp:'独白', en:'Monologue' },
    { key:'birthday',    kr:'', jp:'', en:'' },
    { key:'age',         kr:'28세(2년 전) → 30세(2년 후)', jp:'28歳（2年前）→30歳（2年後）', en:'28 (2 years ago) → 30 (2 years later)' },
    { key:'height',      kr:'170cm', jp:'170cm', en:'170cm' },
    { key:'bloodType',   kr:'XF형<sup class="footnote-ref">1)</sup>', jp:'XF型<sup class="footnote-ref">1)</sup>', en:'Type XF<sup class="footnote-ref">1)</sup>' },
    { key:'origin',      kr:'위대한 항로', jp:'グランドライン', en:'Grand Line' },
    { key:'bounty',      kr:'6억 5,500만 베리', jp:'6億5,500万ベリー', en:'655,000,000 Berries' },
    { key:'ability',     kr:'비능력자, 패기(견문색, 무장색)', jp:'非能力者、覇気（見聞色・武装色）', en:'Non-Devil Fruit user, Haki (Observation, Armament)' },
    { key:'affiliation', kr:'前 바로크 워크스<span class="cell-divider"></span>크로스 길드', jp:'元バロックワークス<span class="cell-divider"></span>クロスギルド', en:'Former Baroque Works<span class="cell-divider"></span>Cross Guild' },
    { key:'favFood',     kr:'빵, 방울토마토', jp:'パン、プチトマト', en:'Bread, cherry tomatoes' },
    { key:'dislikeFood', kr:'버섯, 토마토', jp:'きのこ、トマト', en:'Mushrooms, tomatoes' },
    { key:'hobby',       kr:'독서', jp:'読書', en:'Reading' }
  ];

  const detail = {
    firstPerson: { kr:'나', jp:'私', en:'I' },
    nickname:    {
      value:{ kr:'대배우', jp:'大俳優', en:'The Great Performer' },
      reason:{
        kr:'위대한 항로의 여러 섬을 넘나들면서 단독으로 활동해 온 그녀는, 매번 전혀 다른 성격과 신분, 외모를 바꿔 연기를 하며 철저하게 정체를 위장해 왔다.<br><br>스스로를 \'무대 위의 배우\'라 칭하며 자신과 적대적인 인물은 \'조연\', 우호적인 인물에게는 \'관객\'이라 부르는 독특한 호칭 또한 \'대배우\'라 불리는 데에 한몫했다.',
        jp:'グランドラインの島々を渡り歩きながら単独で活動してきた彼女は、毎回まったく異なる性格や身分、外見を演じ分け、徹底して正体を偽装してきた。<br><br>自らを「舞台の上の役者」と称し、敵対する人物を「脇役」、友好的な人物を「観客」と呼ぶ独特な呼び方もまた、「大俳優」と呼ばれる一因となった。',
        en:'Having operated alone while crossing islands across the Grand Line, she has thoroughly disguised her identity, playing an entirely different personality, status, and appearance each time.<br><br>She calls herself \'a performer on stage,\' referring to those hostile to her as \'supporting roles\' and those friendly to her as \'the audience\' — this distinctive way of addressing people also contributed to her being called \'the Great Performer.\''
      }
    },
    personality: {
      value:{
        kr:'어떤 순간에도 흐트러짐 없는 포커페이스, 철저한 배우.',
        jp:'どんな瞬間も崩れないポーカーフェイス、徹底した役者。',
        en:'A poker face that never breaks, no matter the moment — a thoroughgoing actor.'
      },
      reason:{
        kr:'세상을 무대로, 자신을 그 무대 위의 주인공으로 여기는 태도를 가지고 있다. 과거의 나약한 모습을 철저히 감추기 위해, 그녀는 매 순간 완벽하게 연출된 \'배역\'으로 사람들을 상대한다.<br><br>겉으로는 당당하고 독단적인 대배우로 활동하고 있지만, 내면에는 무의식적인 공포와 결핍이 있다. 조직에 소속되는 것을 꺼리는 이유 역시, 누군가와 깊은 관계를 맺었다가 다시 절망을 맞이할까 봐 두려움을 겪고 있기 때문이다.',
        jp:'世界を舞台とし、自分をその舞台の上の主人公とみなす態度を持っている。過去の弱々しい姿を徹底して隠すため、彼女は瞬間ごとに完璧に演出された「役柄」で人々と接する。<br><br>表向きは堂々として独断的な大俳優として活動しているが、内面には無意識の恐怖と欠乏がある。組織に所属することを避ける理由もまた、誰かと深い関係を築いた末に再び絶望を迎えることを恐れているためである。',
        en:'She regards the world as a stage and herself as the protagonist upon it. To thoroughly conceal her past weakness, she faces people at every moment through a perfectly staged \'role.\'<br><br>On the surface, she carries herself as a confident, headstrong Great Performer, but inwardly she harbors an unconscious fear and sense of lack. Her reluctance to belong to any organization also stems from a fear of forming a deep bond with someone, only to face despair once again.'
      }
    },
    reputation:  {
      kr:'그녀를 한 번이라도 본 이들은 \'속내를 알 수 없는 위험한 인물\'로 평가한다. 섬마다 완전히 다른 성격과 신분, 외모로 살아가며 활동하는 연기력 때문에 그녀를 추적하려는 이들은 전부 실패로 끝났다.<br><br>수많은 이들이 무대 뒤에 숨은 그녀의 진짜 얼굴을 들춰내려 했으나, 오히려 그녀가 짜놓은 완벽한 대본 속에서 조연으로 농락당할 뿐이다.',

      label: { kr:'20년 전 · 10세', jp:'20年前・10歳', en:'20 years ago · 10' },
      body:  {
        kr: `<p>위대한 항로의 어느 섬, 사계절 내내 서늘한 공기가 감돌던 그 섬에서 그녀는 남부러울 것 없는 어린 시절을 보냈다.</p>
<p>그녀의 부모는 섬 내에서 모르는 이가 없을 정도로 명성이 자자한 유명 배우들이었으며, 그 덕에 가정환경은 매우 유복했다.</p>
<p>화려한 극장 분장실의 냄새, 무대 위를 비추던 조명, 그리고 관객들의 아낌없는 박수갈채는 어린 시절의 그녀에게 너무나 당연하고 평화로운 일상이었다.</p>
<div class="scene-break"></div>
<p>본래 그녀는 조용한 아이였다.</p>
<p>부모의 아래에서 무언가를 스스로 결정하기보다는 부모의 품에 의존하는 성향이 강했다.</p>
<p>대기실 구석에 앉아 부모가 대사를 연습하는 모습을 가만히 지켜보거나, 두 사람의 손을 잡고 섬의 한적한 모래사장을 거니는 것이 그녀에게 세상의 전부였다.</p>
<div class="scene-break"></div>
<p>그러나 이 섬에는 특이한 특징이 하나 있었다.</p>
<p>섬에 내리는 비는 일반적인 빗물과 달리 극도의 한기를 품고 있었다.</p>
<p>우산이나 방한 장비 없이 그 차가운 비에 무방비하게 노출될 경우, 불과 몇 시간 만에 체온을 빼앗겨 저체온증으로 사망에 이를 정도로 혹독한 기후였다.</p>
<div class="scene-break"></div>
<p>섬사람들은 늘 하늘을 살폈고, 비가 내리는 날이면 서둘러 지붕 아래로 몸을 숨겼다.</p>
<p>어린 시절의 그녀 역시 비가 내리는 날이면 창밖으로 쏟아지는 서늘한 빗소리를 들으며 부모의 품에 파고들곤 했다.</p>
<p>따뜻한 벽난로 앞, 자신을 감싸 안아주는 부모의 온기 덕분에 그녀는 그 차가운 비가 얼마나 많은 생명을 앗아가는지 미처 실감하지 못하고 있었다.</p>
<div class="scene-break"></div>
<p>그녀가 10세가 되던 해, 평화롭던 섬에 재앙이 들이닥쳤다.</p>
<p>하늘이 뚫린 듯 엄청난 양의 폭우가 쏟아지기 시작했고, 그 비는 섬의 모든 것을 얼려버릴 만큼 극도로 차가웠다.</p>
<p>순식간에 불어난 물은 섬을 집어삼키는 대홍수로 이어졌고, 피할 곳을 찾지 못한 채 빗물에 노출된 이들은 한기 속에서 쓰러져 갔다.</p>
<div class="scene-break"></div>
<p>대홍수의 혼란 속에서 그녀의 집도, 극장도 전부 물에 잠겼다.</p>
<p>피할 수 없는 한기 속에서 부모는 저체온증으로 서서히 죽어갔고, 의존할 곳을 잃은 10세의 그녀는 공포에 질려 눈물을 흘렸다.</p>
<p>숨을 거두기 직전, 부모는 비참하게 무너져 내리는 딸의 손을 꼭 쥐며 마지막 유언을 남겼다.</p>
<div class="scene-break"></div>
<p class="quote-line">"카브레라, 약한 모습을 보이지 말고…… 세상 앞에 당당하고 떳떳하게 살아남아야 한다."</p>
<div class="scene-break"></div>
<p>결국 섬은 완전히 잠겨 지도에서 흔적도 없이 사라졌고, 그녀는 차가운 빗소리와 부모의 시신만을 남긴 채 홀로 살아남았다.</p>`,
        jp: `<p>グランドラインのとある島、四季を通じて肌寒い空気が漂うその島で、彼女は何不自由ない幼少期を過ごした。</p>
<p>彼女の両親は島内で知らぬ者がいないほど名声を博した有名な俳優たちであり、そのおかげで家庭環境は非常に裕福だった。</p>
<p>華やかな劇場の楽屋の匂い、舞台を照らす照明、そして観客たちの惜しみない拍手喝采は、幼い頃の彼女にとってあまりにも当然で平和な日常だった。</p>
<div class="scene-break"></div>
<p>本来、彼女は物静かな子どもだった。</p>
<p>両親の下で何かを自分で決めるよりも、両親の懐に頼る傾向が強かった。</p>
<p>楽屋の隅に座って両親が台詞を練習する姿をじっと見つめたり、二人の手を握って島ののどかな砂浜を歩くことが、彼女にとって世界のすべてだった。</p>
<div class="scene-break"></div>
<p>しかし、この島には一つ、奇妙な特徴があった。</p>
<p>島に降る雨は、一般的な雨水とは違い、極度の冷気を帯びていた。</p>
<p>傘や防寒具もなくその冷たい雨に無防備にさらされた場合、わずか数時間で体温を奪われ、低体温症で死に至るほど過酷な気候だった。</p>
<div class="scene-break"></div>
<p>島の人々は常に空を気にかけ、雨が降る日には急いで屋根の下に身を隠した。</p>
<p>幼い頃の彼女もまた、雨の降る日には窓の外から響く冷たい雨音を聞きながら、両親の懐に潜り込んだものだった。</p>
<p>暖かい暖炉の前、自分を抱きしめてくれる両親のぬくもりのおかげで、彼女はその冷たい雨がどれほど多くの命を奪っているのか、実感できずにいた。</p>
<div class="scene-break"></div>
<p>彼女が10歳になった年、平和だった島に災厄が襲いかかった。</p>
<p>空に穴が開いたかのように凄まじい量の豪雨が降り注ぎ始め、その雨は島のすべてを凍りつかせるほど極度に冷たかった。</p>
<p>瞬く間に増水した水は島を呑み込む大洪水へとつながり、逃げ場を見つけられないまま雨にさらされた者たちは、冷気の中で次々と倒れていった。</p>
<div class="scene-break"></div>
<p>大洪水の混乱の中で、彼女の家も、劇場も、すべてが水に沈んだ。</p>
<p>逃れようのない冷気の中で両親は低体温症で徐々に死んでいき、頼る場所を失った10歳の彼女は恐怖にすくみ、涙を流した。</p>
<p>息を引き取る直前、両親は無残に崩れ落ちる娘の手をしっかりと握り、最後の遺言を残した。</p>
<div class="scene-break"></div>
<p class="quote-line">「カブレラ、弱い姿を見せず……世界の前で堂々と、恥じることなく生き延びるのだ。」</p>
<div class="scene-break"></div>
<p>結局、島は完全に沈み、地図から跡形もなく消え去り、彼女は冷たい雨音と両親の亡骸だけを残して、たった一人生き残った。</p>`,
        en: `<p>On an island in the Grand Line, one where a cool air lingered through all four seasons, she spent a childhood lacking for nothing.</p>
<p>Her parents were famous actors so renowned that no one on the island didn't know them, and thanks to that, her home was very well off.</p>
<p>The scent of the glamorous theater dressing room, the lights that illuminated the stage, and the audience's unstinting applause were, to her as a child, an utterly ordinary and peaceful part of everyday life.</p>
<div class="scene-break"></div>
<p>By nature, she had been a quiet child.</p>
<p>Rather than deciding things for herself, she strongly tended to depend on her parents, resting in their embrace.</p>
<p>Sitting in a corner of the dressing room quietly watching her parents rehearse their lines, or walking the island's quiet sandy shore holding both their hands — that was her entire world.</p>
<div class="scene-break"></div>
<p>But this island had one peculiar characteristic.</p>
<p>The rain that fell on the island, unlike ordinary rainwater, carried an extreme chill.</p>
<p>It was a climate so severe that anyone left unprotected in that cold rain, without an umbrella or cold-weather gear, could lose body heat and die of hypothermia within just a few hours.</p>
<div class="scene-break"></div>
<p>The islanders were always watching the sky, and on rainy days they hurried to take shelter under a roof.</p>
<p>As a child, she too, on rainy days, would burrow into her parents' arms as she listened to the cold sound of rain pouring outside the window.</p>
<p>In front of the warm fireplace, wrapped in the warmth of the parents who held her close, she had no real sense of just how many lives that cold rain was taking.</p>
<div class="scene-break"></div>
<p>The year she turned ten, disaster struck the once-peaceful island.</p>
<p>As if the sky itself had torn open, torrential rain began pouring down in staggering amounts, so extremely cold it seemed capable of freezing everything on the island.</p>
<p>The rapidly rising water became a great flood that swallowed the island whole, and those who found no shelter and were left exposed to the rain collapsed one after another in the cold.</p>
<div class="scene-break"></div>
<p>In the chaos of the great flood, her home and the theater alike were submerged completely.</p>
<p>In the inescapable cold, her parents slowly died of hypothermia, and the ten-year-old girl, having lost the one thing she depended on, wept in terror.</p>
<p>Just before they breathed their last, her parents tightly gripped the hand of their daughter, who was falling apart in grief, and left her their final words.</p>
<div class="scene-break"></div>
<p class="quote-line">"Cabrera, never let them see you weak... You must survive, standing tall and unashamed before the world."</p>
<div class="scene-break"></div>
<p>In the end, the island sank completely and vanished from the map without a trace, and she alone survived, left with nothing but the sound of cold rain and her parents' bodies.</p>`
      }

      label: { kr:'11년 전 · 19세', jp:'11年前・19歳', en:'11 years ago · 19' },
      body:  {
        kr: `<p>10세 당시 물에 잠긴 섬에서 가까스로 해군에 의해 구조되었으나, 그녀의 홀로서기는 순탄치 않았다.</p>
<p>구조 이후 자신을 보호해 주던 일부 해군 인물들의 고압적이고 거친 태도를 겪으며, 그녀는 깊은 반감을 느끼고 결국 스스로 그들을 떠났다.</p>
<p>정의의 이름 아래 억압하는 집단을 목격한 경험은 그녀에게 깊은 불신을 남겼고, 이후에 그녀는 조직에 속하는 것을 거부하며 단독으로 활동하는 삶을 살게 된다.</p>
<div class="scene-break"></div>
<p>그렇게 위대한 항로를 떠돌던 중, 그녀는 약 19세 무렵에 한 분단된 섬에 정착했다.</p>
<p>하나의 섬 안에 두 개의 국가가 긴장 상태를 유지하고 있던 그곳에서, 그녀는 한 국가의 민간인으로 살아가며 오랜만에 안정적인 생활을 시작했다.</p>
<p>그 과정에서 마음을 터놓을 수 있는 소중한 친구를 사귀게 되었는데, 얼마 후 전쟁의 위협이 커지자 친구는 자국을 지키기 위해 군에 입단했다.</p>
<p>친구를 소중히 여겨 혼자 둘 수 없었던 그녀 역시 평소의 소속감에 대한 거부 성향마저 접어둔 채 군에 동참하게 된다.</p>
<div class="scene-break"></div>
<p>군 내부에서 그녀는 타고난 분석 능력과 뛰어난 상황 대처 능력을 인정받아 소수 부대의 지휘를 맡게 되었다.</p>
<p>부대원들과 생사를 함께하며 유대감을 쌓아가는 동안, 그녀는 부모의 죽음 이후 단 한 번도 보여주지 않았던 모습을 드러냈다.</p>
<p>스스로를 감추기 위한 계산된 '연기'가 아닌, 주변 사람들과 스스럼없이 어울리며 짓는 비교적 자연스럽고 밝은 '진짜 미소'를 짓게 된 시기였다.</p>
<div class="scene-break"></div>
<p>그러나 평화는 오래가지 못했고, 두 국가 사이에 본격적인 전쟁이 시작되면서 상황은 걷잡을 수 없이 악화되었다.</p>
<p>치열한 전투 속에서 상황을 분석한 그녀는 이미 기울어버린 전력 차이를 보며 자국의 패배를 확신했다.</p>
<p>그녀는 승리보다 자신이 그토록 아끼던 부대원들의 생존을 최우선으로 삼았고, 전장에서 안전하게 탈출하는 것을 전제로 한 치밀한 작전을 세워 부대에 지시를 내렸다.</p>
<div class="scene-break"></div>
<p>하지만 그녀가 내린 결정과 방향성은 결과적으로 최악의 상황을 불러오는 치명적인 판단이 되고 말았다.</p>
<p>적들의 동태를 완전히 벗어났다고 믿었던 대피로는 순식간에 적으로 가득 찬 곳으로 변했고, 그녀의 지휘를 철저히 믿고 따랐던 부대원들은 단 한 명도 살아남지 못한 채 전원 전사하는 참혹한 결과를 보였다.</p>
<p>자신이 지키고자 했던 친구와 부대원들이 제 눈앞에서 차갑게 식어가는 모습을 보며 그녀는 완전히 무너져 내렸다.</p>
<p>결국 그녀가 속했던 국가마저 전쟁에서 참패하여 역사 속으로 멸망해 사라졌고, 그녀는 또다시 홀로 살아남았다.</p>`,
        jp: `<p>10歳の当時、水に沈んだ島から辛うじて海軍によって救助されたが、彼女の独り立ちは平坦なものではなかった。</p>
<p>救助された後、自分を保護してくれていた一部の海軍の人物たちの高圧的で荒々しい態度を経験し、彼女は深い反感を覚え、結局は自ら彼らのもとを去った。</p>
<p>正義の名の下に抑圧する集団を目の当たりにした経験は彼女に深い不信を残し、以来彼女は組織に属することを拒み、単独で活動する人生を歩むようになる。</p>
<div class="scene-break"></div>
<p>そうしてグランドラインを流浪する中、彼女は19歳ほどの頃、ある分断された島に落ち着いた。</p>
<p>一つの島の中で二つの国家が緊張状態を保っていたその地で、彼女はある一国の民間人として暮らし、久しぶりに安定した生活を始めた。</p>
<p>その過程で心を開いて話せる大切な友人ができたが、しばらくして戦争の脅威が高まると、友人は自国を守るために軍に入隊した。</p>
<p>友人を大切に思い一人にしておけなかった彼女もまた、普段の所属への拒否感すら押し殺し、軍に加わることになる。</p>
<div class="scene-break"></div>
<p>軍の中で彼女は生まれ持った分析力と優れた状況対応力を認められ、少数部隊の指揮を任されることとなった。</p>
<p>部隊員たちと生死を共にしながら絆を築いていく中で、彼女は両親の死以来ただの一度も見せたことのなかった姿を見せるようになった。</p>
<p>自分を隠すための計算された「演技」ではなく、周囲の人々と気兼ねなく打ち解けながら見せる、比較的自然で明るい「本当の笑顔」を見せるようになった時期だった。</p>
<div class="scene-break"></div>
<p>しかし平和は長く続かず、二国間で本格的な戦争が始まると、状況は手のつけられないほど悪化していった。</p>
<p>激しい戦闘の中で状況を分析した彼女は、すでに傾いてしまった戦力差を見て、自国の敗北を確信した。</p>
<p>彼女は勝利よりも、自分がそれほどまでに大切にしていた部隊員たちの生存を最優先とし、戦場から安全に離脱することを前提とした綿密な作戦を立てて部隊に指示を出した。</p>
<div class="scene-break"></div>
<p>しかし彼女が下した決定と方向性は、結果的に最悪の事態を招く致命的な判断となってしまった。</p>
<p>敵の動きから完全に外れたと信じていた退避路は瞬く間に敵で埋め尽くされた場所へと変わり、彼女の指揮を徹底して信じ従っていた部隊員たちは、ただの一人も生き残ることなく全員戦死するという惨たらしい結果となった。</p>
<p>自分が守ろうとしていた友人と部隊員たちが目の前で冷たくなっていく姿を見て、彼女は完全に崩れ落ちた。</p>
<p>結局、彼女が属していた国家すらも戦争に惨敗し、歴史の中へと滅び去り、彼女はまたしても一人生き残った。</p>`,
        en: `<p>At the age of ten, she was barely rescued from the submerged island by the Navy, but her path to standing on her own was far from smooth.</p>
<p>After being rescued, she experienced the overbearing and rough treatment of some of the Navy personnel who were supposed to be protecting her, and feeling deep resentment, she eventually left them of her own accord.</p>
<p>The experience of witnessing a group that oppressed others in the name of justice left her with a deep distrust, and from then on she refused to belong to any organization, choosing to live and act alone.</p>
<div class="scene-break"></div>
<p>As she wandered the Grand Line in this way, at around the age of 19 she settled on a divided island.</p>
<p>There, on an island where two nations maintained an uneasy tension within a single landmass, she lived as a civilian of one nation and, for the first time in a long while, began a stable life.</p>
<p>In the process, she made a precious friend she could open her heart to, but before long, as the threat of war grew, that friend enlisted in the military to protect their country.</p>
<p>Cherishing her friend and unable to leave her alone, she too set aside her usual aversion to belonging anywhere and joined the military.</p>
<div class="scene-break"></div>
<p>Within the military, her innate analytical skill and outstanding ability to handle situations were recognized, and she was entrusted with command of a small unit.</p>
<p>As she built bonds with her unit, sharing life and death together, she began to show a side of herself she had never once revealed since her parents' death.</p>
<p>It was a period in which she came to show, not a calculated "performance" meant to hide herself, but a comparatively natural and bright "real smile," born of mingling freely with those around her.</p>
<div class="scene-break"></div>
<p>But the peace did not last, and once full-scale war broke out between the two nations, the situation deteriorated beyond control.</p>
<p>Analyzing the situation amid fierce fighting, she saw the balance of power had already tipped decisively and became certain her nation would lose.</p>
<p>Placing the survival of the unit members she cherished so deeply above victory itself, she devised a meticulous plan premised on a safe withdrawal from the battlefield and gave the order to her unit.</p>
<div class="scene-break"></div>
<p>But the decision and direction she chose ultimately turned out to be a fatal misjudgment that brought about the worst possible outcome.</p>
<p>The escape route she had believed was completely clear of enemy movement turned, in an instant, into a place swarming with the enemy, and the unit members who had trusted and followed her command without reservation met a horrific end — every single one of them killed, with not one survivor.</p>
<p>Watching the friend and the unit members she had tried to protect grow cold before her very eyes, she completely broke down.</p>
<p>In the end, even the nation she belonged to suffered a crushing defeat in the war and vanished into history, and once again, she alone survived.</p>`
      }
    },
    {
      dotStyle: 'past',
      label: { kr:'10년 전 · 20세', jp:'10年前・20歳', en:'10 years ago · 20' },
      body:  {
        kr: `<p>전장에서 부대원 전원을 잃고 홀로 살아남은 그녀는 멸망해 가는 국가를 뒤로한 채 생존자로 전장을 이탈했다.</p>
<p>아군과 적군의 시체가 산처럼 쌓인 참혹한 불길 속에서, 그녀는 오직 생존해야 한다는 부모의 유언만을 간신히 붙잡은 채 넋이 나간 상태로 나와 바다로 향하는 작은 배에 몸을 던졌다.</p>
<p>어떻게 그 지옥 같은 곳을 뚫고 살아 돌아왔는지 그녀 자신조차 제대로 기억하지 못할 만큼, 그녀가 받은 정신적 충격은 상상을 초월하는 수준이었다.</p>
<div class="scene-break"></div>
<p>그 전쟁은 잔혹하게도 그녀의 생일과 겹쳐 있었다.</p>
<p>가장 축복받아야 할 날에 가장 소중한 이들을 제 판단으로 모두 죽음으로 밀어 넣었다는 죄책감은 그녀의 뇌에서 빠져나올 수 없었다.</p>
<p>이 끔찍한 기억을 감당할 수 없었던 그녀의 정신은 그날의 기억을 부정했고, 이후 그녀는 자신의 생일이 언제였는지조차 완벽하게 잊어버린 상태가 됐다.</p>
<div class="scene-break"></div>
<p>이후 위대한 항로의 새로운 섬에 도착해 정착했으나, 그녀는 이미 인간으로서 완전히 정신이 붕괴된 상태였다.</p>
<p>군 시절 보여주었던 자연스럽고 밝은 '진짜 모습'은 커녕, 어린 시절부터 자신을 지켜온 최소한의 포커페이스 조차 더 이상 지속하지 못할 정도로 마음이 망가져 있었다.</p>
<p>정착 초기 동안 그녀는 그 어떤 대인 관계도 맺지 못한 채, 작은 방구석에 틀어박혀 밤마다 밀려오는 죄책감에 시달렸다.</p>
<p>자신이 내린 지시대로 움직이다 죽어간 부대원들의 얼굴을 떠올릴 때마다 극심한 공포에 떨어야 했고, 정상적인 사회 활동은 완전히 불가능했다.</p>
<div class="scene-break"></div>
<p>기나긴 시간이 흘러 섬에서의 은둔 생활 덕분에 숨을 쉴 수 있을 정도로 상태가 조금씩 나아졌을 때쯤, 그녀는 다시 밖으로 나와 타인과 관계를 맺고 일상을 이어나가기 시작했다.</p>
<p>그러나 상처가 치유되어 이전처럼 '자연스럽고 순수한 자신'으로 돌아간 것이 아니었다.</p>
<p>오히려 마음 한구석이 영원히 마비되어 버린 자신을 감추고 말았다.</p>
<p>그녀는 또다시 나약한 진짜 감정을 드러냈다가 소중한 것을 잃을까 봐 극도로 두려워했다.</p>
<p>그래서 그녀는 감정을 있는 그대로 드러내는 나약한 진짜 자신을 내면 깊은 곳에 가두어 죽여버리기로 결심했다.</p>`,
        jp: `<p>戦場で部隊員全員を失い、ただ一人生き残った彼女は、滅びゆく国家を後にして生存者として戦場を離脱した。</p>
<p>味方と敵の死体が山のように積み重なった凄惨な炎の中で、彼女はただ「生き延びよ」という両親の遺言だけを辛うじて拠り所にし、放心状態のまま抜け出して、海へ向かう小さな船に身を投げた。</p>
<p>どうやってあの地獄のような場所を切り抜けて生きて戻ってきたのか、彼女自身すらまともに覚えていないほど、彼女が受けた精神的衝撃は想像を絶するものだった。</p>
<div class="scene-break"></div>
<p>その戦争は残酷にも彼女の誕生日と重なっていた。</p>
<p>最も祝福されるべき日に、最も大切な者たちを自分の判断ですべて死に追いやってしまったという罪悪感は、彼女の頭から離れることがなかった。</p>
<p>この恐ろしい記憶に耐えられなかった彼女の精神は、その日の記憶を否定し、以後彼女は自分の誕生日がいつだったのかすら完全に忘れてしまった状態になった。</p>
<div class="scene-break"></div>
<p>その後グランドラインの新たな島にたどり着いて定住したが、彼女はすでに人間として完全に精神が崩壊した状態だった。</p>
<p>軍にいた頃に見せていた自然で明るい「本当の姿」どころか、幼い頃から自分を守ってきた最低限のポーカーフェイスすらもはや維持できないほど、心は壊れていた。</p>
<p>定住初期の間、彼女はいかなる対人関係も築けないまま、小さな部屋の隅に閉じこもり、夜ごとに押し寄せる罪悪感に苛まれた。</p>
<p>自分が下した指示どおりに動いて死んでいった部隊員たちの顔を思い出すたびに、激しい恐怖に震えなければならず、正常な社会活動は完全に不可能だった。</p>
<div class="scene-break"></div>
<p>長い時間が流れ、島での隠遁生活のおかげで息ができる程度に状態が少しずつ良くなってきた頃、彼女は再び外へ出て、他人と関わりを持ち、日常を続けていくようになった。</p>
<p>しかし、それは傷が癒えて以前のような「自然で純粋な自分」に戻ったわけではなかった。</p>
<p>むしろ、心の片隅が永遠に麻痺してしまった自分を隠しただけだった。</p>
<p>彼女はまた弱々しい本当の感情を見せてしまい、大切なものを失うのではないかと極度に恐れていた。</p>
<p>だから彼女は、感情をありのままに見せる弱い本当の自分を、心の奥深くに閉じ込めて殺してしまうことを決意した。</p>`,
        en: `<p>Having lost every one of her unit members on the battlefield and survived alone, she left the dying nation behind and withdrew from the front as its sole survivor.</p>
<p>Amid the horrific flames where the bodies of allies and enemies alike piled up like mountains, she clung only, barely, to her parents' final words that she must survive, and in a state of utter shock she made her way out and threw herself into a small boat headed for the sea.</p>
<p>The psychological trauma she suffered was beyond imagining — so severe that she herself could not properly remember how she had made it out of that hell alive.</p>
<div class="scene-break"></div>
<p>Cruelly, that war had coincided with her birthday.</p>
<p>The guilt of having driven, by her own judgment, every one of the people most precious to her to their deaths on the very day that should have been most blessed, would not leave her mind.</p>
<p>Unable to bear this horrific memory, her mind rejected the memory of that day, and afterward she came to completely forget even when her own birthday was.</p>
<div class="scene-break"></div>
<p>Afterward she arrived at and settled on a new island in the Grand Line, but by then she was, as a human being, in a state of complete mental collapse.</p>
<p>Far from the natural, bright "true self" she had shown during her time in the military, her heart was so broken that she could no longer even maintain the minimal poker face that had protected her since childhood.</p>
<p>In the early period of settling there, unable to form any relationships with others at all, she shut herself away in the corner of a small room, tormented night after night by waves of guilt.</p>
<p>Every time she recalled the faces of the unit members who had died carrying out her orders, she was forced to tremble in overwhelming terror, and any normal social life was completely impossible.</p>
<div class="scene-break"></div>
<p>After a long stretch of time, once her secluded life on the island had helped her recover just enough to breathe again, she began to venture outside once more, forming relationships with others and continuing on with daily life.</p>
<p>But this did not mean her wounds had healed and she had returned to being her "natural, unguarded self" as before.</p>
<p>Rather, she had simply learned to hide a self whose heart had gone permanently numb in one corner.</p>
<p>She was terrified, to an extreme degree, that if she ever again showed her weak, true feelings, she would lose something precious once more.</p>
<p>So she resolved to lock the weak, true self who showed her feelings exactly as they were deep within herself, and to kill that self off entirely.</p>`
      }
    },
    {
      dotStyle: 'past',
      label: { kr:'6년 전 · 24세', jp:'6年前・24歳', en:'6 years ago · 24' },
      body:  {
        kr: `<p>위대한 항로의 뜨거운 햇살이 내리쬐는 알라바스타에 낯선 이방인 한 명이 왔다.</p>
<p>그녀는 철저하게 단정함을 숨겨둔 채, 누구나 흔히 볼 수 있는, 평범하고 수수한 옷차림을 하고 있었다.</p>
<p>겉으로 보기에는 그저 이국적인 풍경에 매료되어 이곳저곳을 유랑하는, 세상 물정 모르는 여행 기록을 쓰는 탐구자의 모습이었다.</p>
<p>매 순간 낡은 노트를 펼쳐 들고 섬의 역사와 지형을 꼼꼼하게 받아 적는 그녀의 눈동자에는 순진함과 호기심이 가득 있었다.</p>
<p>본래 지니고 있던 차가운 태도나 오만한 기색은 흔적조차 찾아볼 수 없을 정도로, 그녀는 완벽하게 위장되어 있었다.</p>
<div class="scene-break"></div>
<p>그녀가 연기하는 탐구자는 보기에는 사막의 환경에 쉽게 휩쓸릴 것처럼 나약해 보였지만, 위기 상황이 닥칠 때마다 강단 있는 태도를 보여주며 주위의 신뢰를 쌓는다.</p>
<p>마을의 주민들에게 상냥하게 미소를 건네고 그들의 처지에 깊이 공감하는 척하면서도, 그녀는 한순간도 쉬지 않고 냉정하게 상황을 분석하고 있었다.</p>
<p>인간의 행동 패턴을 관찰하던 지독한 습성은 이 땅에서도 유효했다.</p>
<p>사람들은 그녀가 그저 기록에 집착하는, 올곧고 순수한 학자라고 믿었다.</p>
<div class="scene-break"></div>
<p>그곳에서 생활하는 내내 그녀는 철저하게 단독으로 움직이며 그 어떤 세력이나 집단에도 얽히지 않으려 했다.</p>
<p>그녀는 매일 밤 홀로 방에 틀어박혀 자신이 만든 완벽한 각본을 다듬었다.</p>
<p>낮 동안 보여주었던 순진한 탐구자의 미소는 철저하게 점검한 끝에 나온 배역일 뿐이었고, 진짜 그녀는 모래바람이 불어오는 창밖을 응시하며 오직 떳떳하게 살아남기만을 생각하고 있다.</p>`,
        jp: `<p>グランドラインの灼熱の日差しが降り注ぐアラバスタに、見知らぬ一人の異邦人がやってきた。</p>
<p>彼女は端正さを徹底して隠したまま、誰もがどこにでも見かけるような、平凡で地味な身なりをしていた。</p>
<p>外見上は、ただ異国の風景に魅了されてあちこちを放浪する、世間知らずの旅行記を綴る探究者の姿でしかなかった。</p>
<p>常に古びたノートを広げ、島の歴史と地形を几帳面に書き留める彼女の瞳には、純真さと好奇心が満ちていた。</p>
<p>本来持っていた冷たい態度や傲慢な気配は跡形も見当たらないほど、彼女は完璧に偽装していた。</p>
<div class="scene-break"></div>
<p>彼女が演じる探究者は、見た目には砂漠の環境に容易く呑まれてしまいそうなほど弱々しく見えたが、危機的な状況が訪れるたびに芯の強い態度を見せ、周囲の信頼を積み重ねていった。</p>
<p>村の住民たちに優しく微笑みかけ、彼らの境遇に深く共感するふりをしながらも、彼女は一瞬たりとも休まず冷静に状況を分析していた。</p>
<p>人間の行動パターンを観察するという執拗な習性は、この地でも変わらず有効だった。</p>
<p>人々は彼女のことを、ただ記録に執着する、まっすぐで純粋な学者だと信じていた。</p>
<div class="scene-break"></div>
<p>その地で生活する間ずっと、彼女は徹底して単独で行動し、いかなる勢力や集団とも関わらないようにしていた。</p>
<p>彼女は毎晩一人部屋にこもり、自分が作り上げた完璧な脚本を練り直していた。</p>
<p>昼間に見せていた純真な探究者の微笑みは、徹底的に点検し尽くした末に生まれた役柄にすぎず、本当の彼女は砂嵐が吹きつける窓の外を見つめながら、ただひたすら堂々と生き残ることだけを考えていた。</p>`,
        en: `<p>A lone, unfamiliar stranger arrived in Alabasta, where the scorching sun of the Grand Line beat down.</p>
<p>She had thoroughly concealed her refined features, dressed in plain, unremarkable clothes of the kind one could see anywhere.</p>
<p>On the surface, she looked like nothing more than a naive researcher, wandering here and there, captivated by the exotic scenery, writing down her travels.</p>
<p>Her eyes, as she constantly opened a worn notebook and meticulously recorded the island's history and terrain, were full of innocence and curiosity.</p>
<p>Her disguise was so perfect that not a trace remained of the cold demeanor or arrogant air she naturally carried.</p>
<div class="scene-break"></div>
<p>The researcher she played appeared, at a glance, fragile enough to be easily overwhelmed by the desert environment, yet whenever a crisis arose she showed a resolute composure, steadily building the trust of those around her.</p>
<p>While offering the villagers warm smiles and pretending to deeply empathize with their circumstances, she never once stopped coolly analyzing the situation.</p>
<p>Her relentless habit of studying human behavioral patterns proved just as effective on this land.</p>
<p>People believed she was simply an upright, pure-hearted scholar obsessed with keeping records.</p>
<div class="scene-break"></div>
<p>For as long as she lived there, she moved entirely alone, taking care never to become entangled with any faction or group.</p>
<p>Every night, she shut herself alone in her room, refining the perfect script she herself had written.</p>
<p>The innocent researcher's smile she wore during the day was nothing but a role born of relentless calculation, while the real her stared out at the sandstorm blowing beyond the window, thinking only of surviving with her head held high.</p>`
      }
    },
    {
      dotStyle: 'past',
      label: { kr:'2년 전 · 28세', jp:'2年前・28歳', en:'2 years ago · 28' },
      body:  {
        kr: `<p>알라바스타에서 오랜 시간 신분을 숨기고 활동하던 그녀는, 바로크 워크스와 손을 잡고 협력 관계를 유지하고 있었다.</p>
<p>하지만 그녀는 조직에 대한 충성심이나 애정 따위는 처음부터 단 하나도 없는 상태. 그녀에게 이 곳은 어디까지나 자신의 흥미와 생존과 이익을 위해 이용하는 비즈니스에 불과했다.</p>
<div class="scene-break"></div>
<p>특정 집단에 소속되는 것을 끔찍하게 싫어하는 성격답게, 그녀는 그곳에 있는 사람들과 늘 거리를 유지했다.</p>
<div class="scene-break"></div>
<p>그러던 중, 그녀는 알라바스타에 곧 들이닥칠 사건의 규모가 자신이 감당할 수 없을 정도로 걷잡을 수 없이 커질 것을 본능적으로 직감했다.</p>
<p>어째서인지, '더 이상 이 위험한 곳에 휘말리고 싶지 않다'는 냉정한 판단과 함께 그동안 얽혀 있던 과거의 행적들을 이 기회에 깔끔하게 정리해 버리겠다는 목적이 마음 한구석에 생겼다.</p>
<div class="scene-break"></div>
<p>결국 그녀는 그 누구에게도 행선지를 말하지 않은 채, 나라가 떠들썩하기 직전 자취를 감추어 버렸다. 그리고 자신이 머물던 자리에, 우두머리를 비웃기라도 하듯 오직 짧은 문장이 적힌 한 장의 쪽지만을 남겨두었다.</p>
<p class="quote-line">"Closing performance. (폐막)"</p>
<div class="scene-break"></div>
<p>멋대로 공연의 끝을 알린 채, 그녀는 홀연히 사라졌다. 이후 크로커다일이 큰 싸움에서 패배해 무너진 뒤에도 그녀의 행방은 그 어디에서도 확인되지 않았다.</p>`,
        jp: `<p>アラバスタで長い間身分を隠して活動していた彼女は、バロックワークスと手を組み、協力関係を維持していた。</p>
<p>しかし彼女には、組織への忠誠心や愛着など最初から欠片もなかった。彼女にとってこの場所は、あくまで自分の興味と生存と利益のために利用するビジネスに過ぎなかった。</p>
<div class="scene-break"></div>
<p>特定の集団に属することを極端に嫌う性分らしく、彼女はそこにいる者たちと常に距離を保っていた。</p>
<div class="scene-break"></div>
<p>そんな中、彼女はアラバスタに間もなく訪れる事件の規模が、自分の手に負えないほど収拾のつかない大きさになることを本能的に察知した。</p>
<p>どういうわけか、「これ以上この危険な場所に巻き込まれたくない」という冷静な判断とともに、これまで絡んでいた過去の行いをこの機会にきれいに清算してしまおうという目的が、心の片隅に生まれた。</p>
<div class="scene-break"></div>
<p>結局、彼女は誰にも行き先を告げないまま、国が騒然となる直前に姿を消してしまった。そして自分がいた場所に、まるで頭領を嘲笑うかのように、短い一文だけが書かれた一枚のメモだけを残した。</p>
<p class="quote-line">「Closing performance.（閉幕）」</p>
<div class="scene-break"></div>
<p>勝手に公演の終わりを告げたまま、彼女は忽然と姿を消した。その後、クロコダイルが大きな戦いに敗れて崩れ去った後も、彼女の行方はどこにおいても確認されなかった。</p>`,
        en: `<p>Having operated in Alabasta for a long time while concealing her identity, she had joined hands with Baroque Works and maintained a cooperative relationship with them.</p>
<p>But she had never had even a shred of loyalty or affection for the organization from the start. To her, this place was nothing more than a business to be used for her own interest, survival, and profit.</p>
<div class="scene-break"></div>
<p>True to her nature of despising belonging to any particular group, she always kept her distance from the people there.</p>
<div class="scene-break"></div>
<p>In the midst of this, she instinctively sensed that the scale of the incident about to strike Alabasta would grow beyond anything she could handle.</p>
<p>For some reason, alongside the cold judgment that she no longer wanted to be caught up in this dangerous place, a resolve formed in the corner of her mind to use this opportunity to cleanly settle the past dealings she had been entangled in.</p>
<div class="scene-break"></div>
<p>In the end, without telling anyone where she was headed, she vanished just before the country erupted into chaos. And in the place where she had been staying, as if mocking the organization's leader, she left behind nothing but a single note with one short line written on it.</p>
<p class="quote-line">"Closing performance."</p>
<div class="scene-break"></div>
<p>Having declared the end of the performance entirely on her own terms, she vanished without a trace. Even after Crocodile was later defeated and fell in a great battle, her whereabouts were never confirmed anywhere.</p>`
      }
    },

    {
      dotStyle: 'future',
      label: { kr:'레벨리', jp:'レヴェリー', en:'Reverie' },
      body:  {
        kr: `<p>그녀는 과거의 흔적을 완전히 지운 채 외부와의 접촉을 최소화하며 어느 외딴섬에 정착했다.</p>
<p>그곳에서 그녀는 또 다른 가짜 신분을 쓰고 남들의 눈에 띄지 않는 비교적 평온한 일상을 유지하고 있었다.</p>
<div class="scene-break"></div>
<p>하지만 평화롭던 섬에 뜬금없이 거대한 화재가 발생했고, 이 대화재는 신문 1면을 장식하게 된다.</p>
<p>표면적으로는 자신의 과거 행적을 확실하게 태워 없애기 위한 극단적인 선택처럼 보였으나, 흔적을 지운다는 목적에 비해 지나치게 거대했다.</p>
<p>마치 온 바다에 자신의 생존을 광고하듯 섬 전체를 태워버린 행동의 이면에는, 끈질긴 추적을 피하고 싶어 하면서도 동시에 '누군가'에게 다시 발견되어 자신을 이 무대에서 꺼내주기를 바라는 의존성과 복잡한 심정이 섞여 있다.</p>
<div class="scene-break"></div>
<p>지나치게 흔적을 남긴 대가는 확실했다.</p>
<p>섬의 화재를 신호탄 삼아 바다를 뒤지던 크로커다일의 추적이 그녀를 붙잡은 것이다.</p>
<p>2년 전 "폐막"이라는 쪽지만 남긴 채 도망쳤던 배우를 용납할 리 없는 그가 눈앞에 들이닥쳤을 때, 그녀는 예상외로 별다른 저항을 하지 않았다.</p>
<div class="scene-break"></div>
<p>그녀는 마치 이미 정해져 있던 각본의 다음 장을 맞이하는 것처럼, 들이닥친 손길에 조용히 제압당했다.</p>
<p>그녀는 도망치거나 악을 쓰는 대신 담담하게 두 손을 내밀었고, 구속된 상태로 다시 모습을 드러내게 된다.</p>`,
        jp: `<p>彼女は過去の痕跡を完全に消し去り、外部との接触を最小限に抑えながら、とある離島に定住した。</p>
<p>そこで彼女はまた別の偽りの身分を纏い、人目につかない、比較的穏やかな日常を維持していた。</p>
<div class="scene-break"></div>
<p>しかし平穏だった島に、突如として巨大な火災が発生し、この大火事は新聞の一面を飾ることとなった。</p>
<p>表向きは自分の過去の行いを確実に焼き尽くすための極端な選択のように見えたが、痕跡を消すという目的にしては規模があまりにも大きすぎた。</p>
<p>まるで海中に自らの生存を広告するかのように島全体を燃やし尽くしたこの行動の裏には、執拗な追跡を逃れたいと思いながらも、同時に「誰か」に再び見つけ出され、この舞台から自分を連れ出してほしいと願う依存心と複雑な思いが入り混じっていた。</p>
<div class="scene-break"></div>
<p>過度に痕跡を残した代償は確かなものだった。</p>
<p>島の火災を合図に海を捜索していたクロコダイルの追跡が、彼女を捕らえたのだ。</p>
<p>2年前「閉幕」というメモだけを残して逃げた役者を許すはずもない彼が目の前に現れたとき、彼女は意外にも大した抵抗をしなかった。</p>
<div class="scene-break"></div>
<p>彼女はまるですでに定められていた脚本の次の章を迎えるかのように、迫ってきた手に静かに制圧された。</p>
<p>彼女は逃げたり喚いたりする代わりに、淡々と両手を差し出し、拘束された状態で再び姿を現すことになる。</p>`,
        en: `<p>Having completely erased every trace of her past, she settled on a remote island, keeping contact with the outside world to a minimum.</p>
<p>There she took on yet another false identity and maintained a relatively peaceful, inconspicuous daily life.</p>
<div class="scene-break"></div>
<p>But out of nowhere, a massive fire broke out on the once-peaceful island, and the blaze ended up making front-page news.</p>
<p>On the surface it looked like an extreme choice made to thoroughly burn away every trace of her past, but the scale was far too great for the mere purpose of erasing evidence.</p>
<p>Behind the act of burning the entire island, as if advertising her survival to the whole sea, lay a tangled mix of feelings — wanting to escape relentless pursuit, yet at the same time longing for 'someone' to find her again and pull her off this stage.</p>
<div class="scene-break"></div>
<p>The price for leaving such an excessive trace was certain.</p>
<p>Crocodile, who had been scouring the seas, took the island's fire as a signal, and his pursuit finally caught up with her.</p>
<p>When he — who could never forgive the performer who had fled two years ago leaving nothing but a note reading "Closing performance" — appeared before her, she offered, unexpectedly, no real resistance.</p>
<div class="scene-break"></div>
<p>As if welcoming the next chapter of a script already written, she was quietly overpowered by the hands that seized her.</p>
<p>Instead of fleeing or crying out, she calmly held out both hands, and reappeared in the world in a state of captivity.</p>`
      }
    },
    {
      dotStyle: 'future',
      label: { kr:'와노쿠니', jp:'ワノ国', en:'Wano Country' },
      body:  {
        kr: `<p>크로스 길드가 창설되었을 때 그녀에게는 그 어떤 선택권도, 거부할 수 있는 자유도 주어지지 않았다.</p>
<p>그녀는 자신의 의지와는 상관없이 시대의 흐름에 강제로 휩쓸려 조직에 편입된 상태였다.</p>
<p>2년 전 알라바스타에서 "폐막"이라는 쪽지만 남긴 채 도망쳤던 대가를 치르는 셈.</p>
<p>집단에 소속되는 것을 끔찍하게 싫어하는 그녀이지만, 당장 눈앞에 들이닥친 생존의 위협 앞에서는 고집마저 꺾을 수밖에 없었다.</p>
<div class="scene-break"></div>
<p>그녀는 겉보기에 이전과 다름없이 침착하고 당당한 태도를 보였다.</p>
<p>수많은 일을 겪으며 만들어 낸 '대배우'라는 배역은 빛을 발했다.</p>
<p>상대의 심리를 꿰뚫어 보는 특기를 이용해 크로스 길드 안에서도 기죽지 않고 상대를 여유롭게 받아치는 기세를 보여주었다.</p>
<p>주변의 해적들은 그런 그녀의 흔들림 없는 태도를 보며 여전히 속을 알 수 없는 위험하고 대담한 인물이라 평가했다.</p>`,
        jp: `<p>クロスギルドが結成された時、彼女にはいかなる選択権も、拒否できる自由も与えられていなかった。</p>
<p>彼女は自らの意志とは関係なく、時代の流れに強制的に呑み込まれ、組織に編入された状態だった。</p>
<p>2年前、アラバスタで「閉幕」というメモだけを残して逃げたことの代償を払っているようなものだった。</p>
<p>集団に属することを極端に嫌う彼女ではあったが、目前に迫った生存の脅威の前では、その頑固さすら折らざるを得なかった。</p>
<div class="scene-break"></div>
<p>彼女は表向き、以前と変わらず冷静で堂々とした態度を見せていた。</p>
<p>数多くのことを経て作り上げた「大俳優」という役柄は、その真価を発揮した。</p>
<p>相手の心理を見抜く特技を活かし、クロスギルドの中でも臆することなく、余裕をもって相手をあしらう気勢を見せた。</p>
<p>周囲の海賊たちはそんな彼女の揺るぎない態度を見て、相変わらず腹の内が読めない、危険で大胆な人物だと評した。</p>`,
        en: `<p>When Cross Guild was formed, she was given no choice in the matter, no freedom to refuse.</p>
<p>Regardless of her own will, she had been forcibly swept up in the tide of the times and absorbed into the organization.</p>
<p>In a sense, she was paying the price for having fled Alabasta two years ago, leaving behind nothing but a note that read "Closing performance."</p>
<p>Though she loathed belonging to any group, faced with an immediate threat to her survival, she had no choice but to bend even that stubbornness.</p>
<div class="scene-break"></div>
<p>On the surface, she showed the same calm, confident bearing as always.</p>
<p>The role of "the Great Performer," forged through countless experiences, truly shone.</p>
<p>Using her talent for seeing through others' psychology, she showed, even within Cross Guild, an unshaken composure, effortlessly matching whoever came at her.</p>
<p>The pirates around her, seeing this unshakable attitude, still regarded her as a dangerous, bold figure whose true intentions could never be read.</p>`
      }
    },
    {
      dotStyle: 'future',
      label: { kr:'에그헤드', jp:'エッグヘッド', en:'Egghead' },
      body:  {
        kr: `<p>그녀는 크로커다일의 바로 근처에서 행동하는 모습을 자주 비춘다.</p>
<p>두 인물의 관계는 단순한 명령과 복종의 상하 관계를 이미 넘어서 있다.</p>
<p>서로 간의 물리적인 동선은 물론이고, 상대를 의식하는 심리적인 거리감 역시 눈에 띄게 가까운 편이다.</p>
<div class="scene-break"></div>
<p>크로커다일이 그녀를 늘 제 시야 안의 가까운 곳에 두고 움직이는 상황에 대해, 그녀는 순순히 받아들이는 태도를 보인다.</p>
<p>한때 조직에 소속되는 것을 거부하며 단독으로만 활동하던 시절을 생각하면, 쉽게 상상할 수 없을 정도로 고분고분하고 담담한 반응이다.</p>
<p>그러나 그녀가 보여주는 고분고분한 태도는 절대 충성심이나 무조건적인 복종에서 나온 것이 아니다.</p>
<div class="scene-break"></div>
<p>어디까지나 현재 크로스 길드 내부의 상황과 자신의 위치를 고려해 내린 최선의 생존 방식이다.</p>`,
        jp: `<p>彼女はクロコダイルのすぐ近くで行動する姿がたびたび見受けられる。</p>
<p>二人の関係は、単なる命令と服従の上下関係をすでに超えている。</p>
<p>互いの物理的な動線はもちろん、相手を意識する心理的な距離感もまた、目に見えて近いほうである。</p>
<div class="scene-break"></div>
<p>クロコダイルが彼女を常に自分の視界の近くに置いて動く状況について、彼女は素直に受け入れる態度を見せる。</p>
<p>かつて組織に属することを拒み、単独でのみ活動していた頃を思えば、容易には想像できないほど従順で淡々とした反応である。</p>
<p>しかし、彼女が見せるその従順な態度は、決して忠誠心や無条件の服従から来るものではない。</p>
<div class="scene-break"></div>
<p>あくまで現在のクロスギルド内部の状況と自分の立場を考慮したうえで下した、最善の生存方法にすぎない。</p>`,
        en: `<p>She is often seen acting in close proximity to Crocodile.</p>
<p>The relationship between the two has already gone beyond a simple hierarchy of command and obedience.</p>
<p>Not only their physical movements, but even the psychological distance with which they are aware of one another, is noticeably close.</p>
<div class="scene-break"></div>
<p>As for the fact that Crocodile always keeps her close within his own line of sight, she shows an attitude of simply accepting it.</p>
<p>Given the days when she once refused to belong to any organization and acted only alone, it is a response so docile and composed that it is hard to imagine.</p>
<p>But the docile attitude she displays never comes from loyalty or unconditional submission.</p>
<div class="scene-break"></div>
<p>It is, first and foremost, simply the best survival strategy she has chosen, taking into account the current state of affairs within Cross Guild and her own position within it.</p>`
      }
    }
  ];

  // 어떤 항목의 번외 스토리가 펼쳐져 있는지 (타임라인 인덱스 기준). 언어를 바꿔도 열림 상태 유지됨
  const sideStoryOpenState = {};

  // 어떤 타임라인 항목의 본문이 펼쳐져 있는지 (기본은 전부 닫힘 - 스크롤이 너무 길어지지 않게)
  const timelineOpenState = {};

  // 외모 페이지 - 항목별로 kr/jp/en 값만 채우면 됨
  const swatch = function (hex) {
    return `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${hex};border:1px solid var(--color-border-soft);vertical-align:middle;margin-right:6px;"></span>${hex}`;
  };

  const appearanceFields = [
    {
      label:{ kr:'종족', jp:'種族', en:'Species' },
      value:{ kr:'인간', jp:'人間', en:'Human' }
    },
    {
      label:{ kr:'피부색', jp:'肌の色', en:'Skin tone' },
      value:{ kr: swatch('#FFF6F1'), jp: swatch('#FFF6F1'), en: swatch('#FFF6F1') }
    },
    {
      label:{ kr:'눈의 모양 및 색상', jp:'目の形と色', en:'Eye shape & color' },
      value:{
        kr: `눈매가 날카롭고, 전체적으로 눈꼬리가 양옆으로 길게 뻗어 있다.<br>${swatch('#C9CBD8')}`,
        jp: `目つきが鋭く、全体的に目尻が左右に長く伸びている。<br>${swatch('#C9CBD8')}`,
        en: `Her eyes are sharp, with corners that stretch noticeably outward on both sides.<br>${swatch('#C9CBD8')}`
      }
    },
    {
      label:{ kr:'머리스타일 및 머리색', jp:'髪型と髪色', en:'Hairstyle & hair color' },
      value:{
        kr: `눈 앞쪽을 살짝 가릴 듯 내려온 앞머리가 뺨을 감싸는 옆머리와 연결되어 있다. 길이는 어깨 밑까지, 허쉬컷에 가깝다.<br>${swatch('#28272C')}`,
        jp: `目元を軽く隠すように下ろした前髪が、頬を包み込むようなサイドの髪と繋がっている。長さは肩の下まであり、ハッシュカットに近い。<br>${swatch('#28272C')}`,
        en: `Bangs that fall to lightly cover her eyes connect seamlessly into side locks that frame her cheeks. The length reaches just below her shoulders, closer to a shag/hush cut.<br>${swatch('#28272C')}`
      }
    },
    {
      label:{ kr:'신체적 특징', jp:'身体的特徴', en:'Physical features' },
      value:{
        kr:'마른 편이지만 골격이 탄탄하게 잡혀 있어 슬림한 체형이다. 특히 하체 쪽의 비율과 라인이 유독 돋보이는 편.',
        jp:'痩せ型ではあるが骨格がしっかりしており、スリムな体型をしている。特に下半身の比率とラインが際立って目を引くほうだ。',
        en:'She is on the slender side, but with a well-defined frame that gives her a slim build. Her lower-body proportions and lines in particular stand out.'
      }
    },
    {
      label:{ kr:'평소 복장', jp:'普段の服装', en:'Everyday outfit' },
      value:{
        kr:'화려한 장식이나 원색은 배제하고, 블랙 앤 화이트의 무채색을 기반으로 한 단정하고 정갈한 스타일을 고수하는 편.',
        jp:'派手な装飾や原色は避け、ブラック＆ホワイトの無彩色を基調とした、きちんとして端正なスタイルを貫いている。',
        en:'She avoids flashy decoration or primary colors, sticking to a neat, tidy style built around a black-and-white, achromatic palette.'
      }
    }
  ];

  // 현재 보고 있는 페이지
  const appPages = [
    { id:'pageProfile',    labelKey:'PROFILE' },
    { id:'pageAppearance', labelKey:'APPEARANCE' },
    { id:'pagePast',       labelKey:'STORY' }
  ];
  let currentPageIndex = 0;

  /* ========================================================
     3. 렌더링
     ======================================================== */

  function renderAppearance(lang) {
    document.getElementById('appearanceLabel').textContent = 'APPEARANCE';

    document.getElementById('appearanceList').innerHTML = appearanceFields.map(function (field) {
      return `
        <div class="detail-item">
          <p class="detail-label">${field.label[lang] || ''}</p>
          <p class="detail-value">${field.value[lang] || ''}</p>
        </div>
      `;
    }).join('');
  }

  function waveformBars(count) {
    let bars = '';
    for (let i = 0; i < count; i++) {
      const h = 6 + Math.floor(Math.random() * 12);
      bars += `<span style="height:${h}px;"></span>`;
    }
    return bars;
  }

  function renderPast(lang) {
    document.getElementById('pastLabel').textContent = 'STORY';

    let sideStoryCounter = 0;

    document.getElementById('timeline').innerHTML = timelinePhases.map(function (phase, i) {
      const isItemOpen = !!timelineOpenState[i];
      const isSideOpen = !!sideStoryOpenState[i];
      const hasSideStory = phase.sideStory;

      let sideStoryHTML = '';
      if (hasSideStory) {
        sideStoryCounter++;
        sideStoryHTML = `
          <div class="side-story">
            <button class="side-story-toggle ${isSideOpen ? 'is-open' : ''}" data-index="${i}">
              <span class="side-story-number">${String(sideStoryCounter).padStart(2, '0')}</span>
              <span class="side-story-chevron">${isSideOpen ? '▴' : '▾'}</span>
            </button>
            ${isSideOpen ? `<div class="side-story-body">${phase.sideStory[lang] || ''}</div>` : ''}
          </div>
        `;
      }

      const bodyHTML = isItemOpen ? `
        <div class="timeline-body">${phase.body[lang] || ''}</div>
        ${sideStoryHTML}
      ` : '';

      return `
        <div class="timeline-item">
          <button class="timeline-marker" data-timeline-index="${i}">
            <span class="timeline-dot timeline-dot--${phase.dotStyle}"></span>
            <span class="timeline-label timeline-label--${phase.dotStyle}">${phase.label[lang] || ''}</span>
            <span class="timeline-chevron">${isItemOpen ? '▴' : '▾'}</span>
          </button>
          ${bodyHTML}
        </div>
      `;
    }).join('');

    document.querySelectorAll('.timeline-marker').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const i = Number(btn.dataset.timelineIndex);
        timelineOpenState[i] = !timelineOpenState[i];
        renderPast(currentLang);
      });
    });

    document.querySelectorAll('.side-story-toggle').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        const i = Number(btn.dataset.index);
        sideStoryOpenState[i] = !sideStoryOpenState[i];
        renderPast(currentLang);
      });
    });
  }

  function updatePageNav() {
    document.getElementById('pageIndicator').textContent =
      appPages[currentPageIndex].labelKey + ' · ' + (currentPageIndex + 1) + ' / ' + appPages.length;
    document.getElementById('prevPageBtn').disabled = currentPageIndex === 0;
    document.getElementById('nextPageBtn').disabled = currentPageIndex === appPages.length - 1;

    appPages.forEach(function (p, i) {
      document.getElementById(p.id).hidden = i !== currentPageIndex;
    });
  }

  document.getElementById('prevPageBtn').addEventListener('click', function () {
    if (currentPageIndex > 0) { currentPageIndex--; updatePageNav(); window.scrollTo(0, 0); }
  });
  document.getElementById('nextPageBtn').addEventListener('click', function () {
    if (currentPageIndex < appPages.length - 1) { currentPageIndex++; updatePageNav(); window.scrollTo(0, 0); }
  });

  let currentLang = 'kr';

  function render(lang) {
    currentLang = lang;
    document.body.setAttribute('lang', lang === 'kr' ? 'ko' : lang === 'jp' ? 'ja' : 'en');
    document.querySelectorAll('.lang-switcher button').forEach(function (btn) {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });

    const L = labels[lang];

    document.getElementById('basicInfoLabel').textContent = 'BASIC INFO';
    document.getElementById('detailLabel').textContent = 'DETAIL';
    document.getElementById('voiceLabel').textContent = L.voice;

    document.getElementById('infoGrid').innerHTML =
      basicInfo.map(function (item) {
        return '<div class="info-cell"><dt>' + L[item.key] + '</dt><dd>' + (item[lang] || '') + '</dd></div>';
      }).join('') + '<div class="info-cell"></div>';

    document.getElementById('footnotes').innerHTML =
      footnotes.map(function (fn) {
        return '<p>' + fn.num + ' ' + (fn[lang] || '') + '</p>';
      }).join('');

    document.getElementById('detailList').innerHTML = `
      <div class="detail-item">
        <p class="detail-label">${L.firstPerson}</p>
        <p class="detail-value">${detail.firstPerson[lang] || ''}</p>
      </div>
      <div class="detail-item">
        <p class="detail-label">${L.nickname}</p>
        <p class="detail-value">${detail.nickname.value[lang] || ''}</p>
        <div class="detail-reason"><p>${detail.nickname.reason[lang] || ''}</p></div>
      </div>
      <div class="detail-item">
        <p class="detail-label">${L.personality}</p>
        <p class="detail-value">${detail.personality.value[lang] || ''}</p>
        <div class="detail-reason"><p>${detail.personality.reason[lang] || ''}</p></div>
      </div>
      <div class="detail-item">
        <p class="detail-label">${L.reputation}</p>
        <p class="detail-value detail-value--long">${detail.reputation[lang] || ''}</p>
      </div>
      <div class="detail-item">
        <p class="detail-label">${L.strength}</p>
        <p class="detail-value">${detail.strength.value[lang] || ''}</p>
        <div class="detail-reason"><p>${detail.strength.reason[lang] || ''}</p></div>
      </div>
      <div class="detail-item">
        <p class="detail-label">${L.weakness}</p>
        <p class="detail-value">${detail.weakness.value[lang] || ''}</p>
        <div class="detail-reason"><p>${detail.weakness.reason[lang] || ''}</p></div>
      </div>
      <div class="detail-item">
        <p class="detail-label">${L.values}</p>
        <p class="detail-value">${detail.values.value[lang] || ''}</p>
        <div class="detail-reason"><p>${detail.values.reason[lang] || ''}</p></div>
      </div>
    `;

    document.getElementById('voiceList').innerHTML =
      voiceClips.map(function (clip) {
        return `
          <div class="voice-clip">
            <div class="voice-title">
              <span class="voice-number">${clip.number}</span>
              <span class="voice-subtitle">${clip.title[lang] || ''}</span>
            </div>
            <div class="voice-player">
              <button class="play-btn" aria-label="play">
                <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
              </button>
              <div class="waveform">${waveformBars(12)}</div>
              <span class="time">0:00 / 0:00</span>
              <audio class="audio-el" src="${clip.src}"></audio>
            </div>
          </div>
        `;
      }).join('');

    attachVoicePlayers();
    renderAppearance(lang);
    renderPast(lang);
  }

  function attachVoicePlayers() {
    document.querySelectorAll('.voice-player').forEach(function (player) {
      const btn = player.querySelector('.play-btn');
      const audio = player.querySelector('.audio-el');
      const timeEl = player.querySelector('.time');

      function formatTime(sec) {
        if (!isFinite(sec)) return '0:00';
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60).toString().padStart(2, '0');
        return m + ':' + s;
      }

      btn.addEventListener('click', function () {
        if (!audio.getAttribute('src')) return;
        if (audio.paused) {
          audio.play();
          btn.classList.add('is-playing');
        } else {
          audio.pause();
          btn.classList.remove('is-playing');
        }
      });

      audio.addEventListener('timeupdate', function () {
        timeEl.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
      });

      audio.addEventListener('ended', function () {
        btn.classList.remove('is-playing');
      });
    });
  }

  /* ========================================================
     4. 언어 전환 버튼
     ======================================================== */
  document.querySelectorAll('.lang-switcher button').forEach(function (btn) {
    btn.addEventListener('click', function () { render(btn.dataset.lang); });
  });

  render('kr');
  updatePageNav();

</script>

</body>
</html>
